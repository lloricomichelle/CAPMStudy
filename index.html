    <span class="chapter-meta-item">⭐ High Exam Relevance — Formulas Tested!</span>
  </div>
</div>

<h2 class="section-title" id="s-schedule-intro"><span class="s-num">10.1</span> Schedule Management Overview</h2>
<p>Schedule management involves planning, developing, managing, executing, and controlling the project schedule. The schedule is one of the three project baselines and is critical to project monitoring and control.</p>
<p><strong>Schedule management process:</strong> Define Activities → Sequence Activities → Estimate Durations → Develop Schedule → Control Schedule</p>

<h2 class="section-title" id="s-activity-def"><span class="s-num">10.2</span> Define & Sequence Activities</h2>
<p><strong>Activity Definition:</strong> Work packages from the WBS are decomposed into <strong>schedule activities</strong> — the specific actions to be performed to complete deliverables.</p>
<p><strong>Activity Sequencing:</strong> Establishing the logical order of activities. The result is a <strong>Network Diagram</strong> showing the dependencies between activities.</p>
<p>Most common technique: <strong>Precedence Diagramming Method (PDM)</strong> — boxes represent activities, arrows represent dependencies.</p>

<h2 class="section-title" id="s-dependencies"><span class="s-num">10.3</span> Dependencies & Relationships</h2>
<div class="table-wrap">
<table>
  <tr><th>Relationship Type</th><th>Abbreviation</th><th>Meaning</th><th>Most Common?</th></tr>
  <tr><td><strong>Finish-to-Start</strong></td><td>FS</td><td>Activity B cannot START until Activity A FINISHES</td><td>✅ Yes — most common</td></tr>
  <tr><td><strong>Finish-to-Finish</strong></td><td>FF</td><td>Activity B cannot FINISH until Activity A FINISHES</td><td>Less common</td></tr>
  <tr><td><strong>Start-to-Start</strong></td><td>SS</td><td>Activity B cannot START until Activity A STARTS</td><td>Less common</td></tr>
  <tr><td><strong>Start-to-Finish</strong></td><td>SF</td><td>Activity B cannot FINISH until Activity A STARTS</td><td>Rare</td></tr>
</table>
</div>
<p><strong>Lag:</strong> Waiting time between activities. A 2-day lag after painting before installation can begin.<br>
<strong>Lead:</strong> Overlap between activities (negative lag). Starting activity B 2 days before activity A finishes.</p>

<h2 class="section-title" id="s-critical-path"><span class="s-num">10.4</span> Critical Path Method (CPM)</h2>
<p>The <strong>Critical Path Method</strong> identifies the longest path through the project's network diagram. This longest path determines the <strong>minimum project duration</strong>.</p>
<p><strong>Critical Path characteristics:</strong></p>
<ul>
  <li>The longest path from start to finish</li>
  <li>Activities on the critical path have <strong>zero float</strong></li>
  <li>Any delay to a critical path activity delays the project completion date</li>
  <li>The project can have multiple critical paths (all with zero float)</li>
  <li>A critical path can change during the project as activities are delayed or expedited</li>
</ul>

<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Critical Exam Point</div>
    <p>The critical path is the <strong>LONGEST</strong> path, not the most important activities. Activities on the critical path have <strong>zero float/slack</strong>. Delaying them delays the entire project.</p>
  </div>
</div>

<h2 class="section-title" id="s-float"><span class="s-num">10.5</span> Float and Slack</h2>
<p><strong>Float</strong> (also called <strong>Slack</strong>) is the amount of time an activity can be delayed without delaying the project finish date (or violating a schedule constraint).</p>

<div class="formula-block">
  <div class="formula-label">Float Calculation</div>
  <div class="formula-expr">Float = Late Start (LS) − Early Start (ES)</div>
  <div class="formula-vars">OR: <span>Float = Late Finish (LF) − Early Finish (EF)</span></div>
  <div class="formula-example">If ES = Day 5 and LS = Day 8: <strong>Float = 3 days</strong> (activity can slip 3 days without affecting project end)</div>
</div>

<p><strong>Types of float:</strong></p>
<ul>
  <li><strong>Total Float:</strong> Amount of time an activity can be delayed without delaying the project end date</li>
  <li><strong>Free Float:</strong> Amount of time an activity can be delayed without delaying the early start of any successor activity</li>
  <li><strong>Critical Path:</strong> Total Float = 0</li>
</ul>

<h2 class="section-title" id="s-schedule-compression"><span class="s-num">10.6</span> Schedule Compression</h2>
<p>When the schedule needs to be shortened, two techniques are available:</p>
<div class="compare-grid">
  <div class="compare-col">
    <div class="compare-col-header">Crashing</div>
    <div class="compare-col-body">
      <p style="font-size:13px;"><strong>Adding resources</strong> to critical path activities to reduce duration. Examples: overtime, additional personnel, faster equipment.</p>
      <p style="font-size:13px;margin-top:8px;"><strong>Result:</strong> Shorter duration but HIGHER COST. Always adds cost.</p>
      <p style="font-size:13px;"><strong>Rule:</strong> Crash only critical path activities. Crashing non-critical activities wastes money.</p>
    </div>
  </div>
  <div class="compare-col">
    <div class="compare-col-header" style="background:#00695c;">Fast Tracking</div>
    <div class="compare-col-body">
      <p style="font-size:13px;"><strong>Performing activities in parallel</strong> that were originally planned sequentially. No added cost, but INCREASED RISK.</p>
      <p style="font-size:13px;margin-top:8px;"><strong>Result:</strong> Shorter duration, same cost, but higher risk of rework if parallel activities are interdependent.</p>
      <p style="font-size:13px;"><strong>Example:</strong> Starting construction before all designs are finalized.</p>
    </div>
  </div>
</div>

<h2 class="section-title" id="s-pert"><span class="s-num">10.7</span> PERT Estimation</h2>
<p><strong>Program Evaluation and Review Technique (PERT)</strong> uses three-point estimates to account for uncertainty in task durations.</p>

<div class="formula-block">
  <div class="formula-label">PERT Expected Duration</div>
  <div class="formula-expr">te = (O + 4M + P) ÷ 6</div>
  <div class="formula-vars">
    <span>O</span> = Optimistic estimate (best case)<br>
    <span>M</span> = Most Likely estimate<br>
    <span>P</span> = Pessimistic estimate (worst case)
  </div>
  <div class="formula-example">O=4, M=8, P=18: <strong>te = (4 + 32 + 18) / 6 = 54/6 = 9 days</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">PERT Standard Deviation (Uncertainty)</div>
  <div class="formula-expr">σ = (P − O) ÷ 6</div>
  <div class="formula-vars">Measures the risk/uncertainty in the estimate. Larger σ = more uncertain.</div>
  <div class="formula-example">P=18, O=4: <strong>σ = (18−4)/6 = 14/6 = 2.33 days</strong></div>
</div>

<h2 class="section-title" id="s-gantt"><span class="s-num">10.8</span> Gantt Charts</h2>
<p>A <strong>Gantt chart</strong> is a horizontal bar chart showing the project schedule. It displays activities on the vertical axis and time on the horizontal axis. Bar length represents duration. It is the most commonly used scheduling tool.</p>
<p><strong>Key features:</strong> Activities, durations, dependencies (arrows between bars), milestones (diamonds), current date line, progress bars showing completion.</p>
<p><strong>Limitations:</strong> Does not clearly show dependencies in complex projects; network diagrams are better for that purpose.</p>

<h2 class="section-title" id="s-rolling-wave"><span class="s-num">10.9</span> Rolling Wave Planning</h2>
<p><strong>Rolling wave planning</strong> is a form of progressive elaboration where near-term work is planned in detail while future work is planned at a higher level. As the project progresses and more information becomes available, future work is further elaborated.</p>
<p>This is practical because you simply cannot know all the details of work six months from now at the start of the project. Rolling wave planning is used in both predictive and agile projects.</p>

<h2 class="section-title" id="s-cost-planning"><span class="s-num">11.1</span> Cost Planning Overview</h2>
<p>Cost management involves planning, estimating, budgeting, financing, managing, and controlling costs so the project can be completed within the approved budget.</p>
<p><strong>Cost management plan</strong> defines: estimation approach, level of accuracy required, units of measure, reporting formats, and how variances will be managed.</p>

<h2 class="section-title" id="s-estimation"><span class="s-num">11.2</span> Estimation Techniques</h2>
<div class="table-wrap">
<table>
  <tr><th>Technique</th><th>Description</th><th>Accuracy</th><th>When Used</th></tr>
  <tr>
    <td><strong>Analogous (Top-Down)</strong></td>
    <td>Uses historical data from similar past projects</td>
    <td>Low (−25% to +75%)</td>
    <td>Early in project, limited information</td>
  </tr>
  <tr>
    <td><strong>Parametric</strong></td>
    <td>Statistical relationship between historical data and variables (e.g., cost per unit × units)</td>
    <td>Medium (−10% to +25%)</td>
    <td>When reliable metrics are available</td>
  </tr>
  <tr>
    <td><strong>Bottom-Up</strong></td>
    <td>Estimating individual work packages and rolling them up</td>
    <td>High (−5% to +10%)</td>
    <td>Detailed planning phase</td>
  </tr>
  <tr>
    <td><strong>Three-Point (PERT)</strong></td>
    <td>Uses O, M, P estimates: te = (O+4M+P)/6</td>
    <td>High</td>
    <td>When uncertainty is significant</td>
  </tr>
  <tr>
    <td><strong>Expert Judgment</strong></td>
    <td>Input from experienced individuals or groups</td>
    <td>Varies</td>
    <td>Any stage</td>
  </tr>
</table>
</div>

<h2 class="section-title" id="s-budget"><span class="s-num">11.3</span> Budgeting & Reserves</h2>
<p>The project budget is assembled from:</p>
<ul>
  <li><strong>Activity Cost Estimates:</strong> Bottom-up estimates for each work package</li>
  <li><strong>Contingency Reserve:</strong> Budget for <strong>known unknowns</strong> — identified risks that may occur. PM controls this.</li>
  <li><strong>Management Reserve:</strong> Budget for <strong>unknown unknowns</strong> — unforeseeable events. Requires sponsor/executive approval to access.</li>
  <li><strong>Cost Baseline:</strong> Approved time-phased budget excluding management reserve</li>
  <li><strong>Project Budget:</strong> Cost Baseline + Management Reserve</li>
</ul>

<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Reserves — Know the Difference!</div>
    <p><strong>Contingency Reserve:</strong> For KNOWN risks (risk register). PM can use it. Part of the cost baseline.<br>
    <strong>Management Reserve:</strong> For UNKNOWN risks. Needs executive approval. NOT part of the cost baseline.</p>
  </div>
</div>

<h2 class="section-title" id="s-evm"><span class="s-num">11.4</span> Earned Value Management (EVM)</h2>
<p><strong>Earned Value Management (EVM)</strong> is a project performance measurement technique that integrates scope, schedule, and cost to provide an objective measure of project performance and progress.</p>
<p>EVM uses three fundamental quantities:</p>
<div class="table-wrap">
<table>
  <tr><th>Term</th><th>Abbreviation</th><th>Old Name</th><th>Definition</th></tr>
  <tr>
    <td><strong>Planned Value</strong></td>
    <td>PV</td>
    <td>BCWS</td>
    <td>Authorized budget for planned work at a given point in time</td>
  </tr>
  <tr>
    <td><strong>Earned Value</strong></td>
    <td>EV</td>
    <td>BCWP</td>
    <td>Authorized budget for work actually performed (EV = BAC × % complete)</td>
  </tr>
  <tr>
    <td><strong>Actual Cost</strong></td>
    <td>AC</td>
    <td>ACWP</td>
    <td>Actual cost incurred for work performed</td>
  </tr>
  <tr>
    <td><strong>Budget At Completion</strong></td>
    <td>BAC</td>
    <td>—</td>
    <td>Total authorized budget for the project</td>
  </tr>
</table>
</div>

<h2 class="section-title" id="s-evm-formulas"><span class="s-num">11.5</span> All EVM Formulas</h2>

<div class="formula-block">
  <div class="formula-label">Earned Value (EV)</div>
  <div class="formula-expr">EV = BAC × % Actual Complete</div>
  <div class="formula-example">BAC = $200K, 40% done: <strong>EV = $80,000</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Schedule Variance (SV)</div>
  <div class="formula-expr">SV = EV − PV</div>
  <div class="formula-vars"><span>Positive</span> = Ahead of schedule &nbsp;|&nbsp; <span>Negative</span> = Behind schedule &nbsp;|&nbsp; Zero = On schedule</div>
  <div class="formula-example">EV=$80K, PV=$100K: <strong>SV = -$20K (behind schedule)</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Cost Variance (CV)</div>
  <div class="formula-expr">CV = EV − AC</div>
  <div class="formula-vars"><span>Positive</span> = Under budget &nbsp;|&nbsp; <span>Negative</span> = Over budget &nbsp;|&nbsp; Zero = On budget</div>
  <div class="formula-example">EV=$80K, AC=$95K: <strong>CV = -$15K (over budget)</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Schedule Performance Index (SPI)</div>
  <div class="formula-expr">SPI = EV ÷ PV</div>
  <div class="formula-vars"><span>&gt;1</span> = Ahead of schedule &nbsp;|&nbsp; <span>=1</span> = On schedule &nbsp;|&nbsp; <span>&lt;1</span> = Behind schedule</div>
  <div class="formula-example">EV=$80K, PV=$100K: <strong>SPI = 0.80</strong> (getting only 80% of planned work done)</div>
</div>

<div class="formula-block">
  <div class="formula-label">Cost Performance Index (CPI) ⭐ Most Important</div>
  <div class="formula-expr">CPI = EV ÷ AC</div>
  <div class="formula-vars"><span>&gt;1</span> = Under budget &nbsp;|&nbsp; <span>=1</span> = On budget &nbsp;|&nbsp; <span>&lt;1</span> = Over budget</div>
  <div class="formula-example">EV=$80K, AC=$95K: <strong>CPI = 0.842</strong> (getting only 84¢ of value for every $1 spent)</div>
</div>

<div class="formula-block">
  <div class="formula-label">Estimate At Completion — CPI Continues (Most Used)</div>
  <div class="formula-expr">EAC = BAC ÷ CPI</div>
  <div class="formula-vars">Use when current CPI is expected to continue for remainder of project</div>
  <div class="formula-example">BAC=$200K, CPI=0.842: <strong>EAC = $200K / 0.842 = $237,530</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Estimate At Completion — Atypical Variance (Original Estimate OK)</div>
  <div class="formula-expr">EAC = AC + (BAC − EV)</div>
  <div class="formula-vars">Use when variance was atypical; remaining work done at planned rate</div>
  <div class="formula-example">AC=$95K, BAC=$200K, EV=$80K: <strong>EAC = $95K + $120K = $215K</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Estimate To Complete (ETC)</div>
  <div class="formula-expr">ETC = EAC − AC</div>
  <div class="formula-vars">How much MORE money needed from today to finish</div>
  <div class="formula-example">EAC=$237K, AC=$95K: <strong>ETC = $142,530 remaining to spend</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">Variance At Completion (VAC)</div>
  <div class="formula-expr">VAC = BAC − EAC</div>
  <div class="formula-vars"><span>Positive</span> = Will finish under budget &nbsp;|&nbsp; <span>Negative</span> = Will finish over budget</div>
  <div class="formula-example">BAC=$200K, EAC=$237K: <strong>VAC = -$37K (will be over budget)</strong></div>
</div>

<div class="formula-block">
  <div class="formula-label">To-Complete Performance Index (TCPI)</div>
  <div class="formula-expr">TCPI = (BAC − EV) ÷ (BAC − AC)</div>
  <div class="formula-vars">CPI needed on REMAINING work to finish within budget. <span>&gt;1</span> = must improve efficiency.</div>
  <div class="formula-example">BAC=$200K, EV=$80K, AC=$95K: TCPI = (200-80)/(200-95) = 120/105 = <strong>1.14</strong> (need 14% more efficiency)</div>
</div>

<h2 class="section-title" id="s-project-selection"><span class="s-num">11.6</span> Project Selection Methods</h2>
<div class="table-wrap">
<table>
  <tr><th>Method</th><th>Formula/Concept</th><th>Rule</th></tr>
  <tr>
    <td><strong>NPV (Net Present Value)</strong></td>
    <td>PV of future cash flows − Initial Investment</td>
    <td>Higher NPV = better. Positive NPV = adds value. Select highest NPV.</td>
  </tr>
  <tr>
    <td><strong>IRR (Internal Rate of Return)</strong></td>
    <td>Rate at which NPV = 0</td>
    <td>Higher IRR = better. Select project with highest IRR.</td>
  </tr>
  <tr>
    <td><strong>Payback Period</strong></td>
    <td>Time to recover initial investment</td>
    <td>Shorter payback = better. Select shortest payback period.</td>
  </tr>
  <tr>
    <td><strong>BCR (Benefit Cost Ratio)</strong></td>
    <td>Benefits ÷ Costs</td>
    <td>>1 = benefits exceed costs. Higher BCR = better.</td>
  </tr>
  <tr>
    <td><strong>Opportunity Cost</strong></td>
    <td>Value of the best alternative NOT chosen</td>
    <td>If you choose Project A with NPV $100K over Project B with NPV $150K, opportunity cost = $150K</td>
  </tr>
</table>
</div>
`;

<h2 class="section-title" id="s-risk-intro"><span class="s-num">12.1</span> Risk Management Overview</h2>

<div class="callout definition">
  <div class="callout-icon">📘</div>
  <div class="callout-body">
    <div class="callout-title">Definition</div>
    <p>A <strong>risk</strong> is an uncertain event or condition that, if it occurs, has a positive or negative effect on one or more project objectives.</p>
  </div>
</div>

<p>Key concepts:</p>
<ul>
  <li><strong>Threats:</strong> Risks with negative impacts on project objectives</li>
  <li><strong>Opportunities:</strong> Risks with positive impacts — these are often overlooked! The exam tests whether you manage opportunities too.</li>
  <li><strong>Risk Tolerance:</strong> The acceptable level of variation in project performance</li>
  <li><strong>Risk Appetite:</strong> The degree of uncertainty the organization is willing to accept</li>
  <li><strong>Risk Threshold:</strong> The specific point above which the risk is unacceptable</li>
  <li><strong>Risk Exposure:</strong> Probability × Impact of a risk</li>
  <li><strong>Residual Risk:</strong> Risk remaining after a risk response is implemented</li>
  <li><strong>Secondary Risk:</strong> New risk that arises as a direct result of implementing a risk response</li>
</ul>

<h2 class="section-title" id="s-risk-identify"><span class="s-num">12.2</span> Identify Risks</h2>
<p>Risk identification is <strong>continuous</strong> throughout the entire project. New risks can emerge at any time.</p>
<p><strong>Risk identification techniques:</strong></p>
<ul>
  <li><strong>Brainstorming:</strong> Team generates a list of potential risks</li>
  <li><strong>SWOT Analysis:</strong> Strengths, Weaknesses, Opportunities, Threats</li>
  <li><strong>Checklist Analysis:</strong> Review of historical project risk categories</li>
  <li><strong>Interviews:</strong> Structured discussions with subject matter experts</li>
  <li><strong>Root Cause Analysis:</strong> Identifying underlying causes of potential problems</li>
  <li><strong>Risk Breakdown Structure (RBS):</strong> Hierarchical list of risk categories</li>
  <li><strong>Assumptions Analysis:</strong> Reviewing assumptions for potential risks if they prove false</li>
</ul>
<p><strong>Key output:</strong> <strong>Risk Register</strong> — the document that records all identified risks with: description, probability, impact, risk owner, response plan, and current status.</p>

<h2 class="section-title" id="s-risk-qualitative"><span class="s-num">12.3</span> Qualitative Risk Analysis</h2>
<p>Qualitative analysis prioritizes risks using a <strong>Probability and Impact Matrix</strong>. It is faster and less costly than quantitative analysis and is used to screen risks for further quantitative analysis or immediate response planning.</p>

<p><strong>Process:</strong></p>
<ol>
  <li>Assess each risk's probability (how likely to occur: Low, Medium, High)</li>
  <li>Assess each risk's impact (how severe if it occurs: Low, Medium, High)</li>
  <li>Multiply P × I to get the risk score</li>
  <li>Prioritize: High risks need immediate attention; Low risks may just be monitored</li>
</ol>

<div class="callout tip">
  <div class="callout-icon">💡</div>
  <div class="callout-body">
    <div class="callout-title">Qualitative vs. Quantitative — Key Difference</div>
    <p><strong>Qualitative:</strong> Uses descriptive scales (High/Medium/Low) — Fast and simple. Used on ALL projects.<br>
    <strong>Quantitative:</strong> Uses numbers and statistical models — Time-consuming and expensive. Used on complex, high-risk projects only.</p>
  </div>
</div>

<h2 class="section-title" id="s-risk-quantitative"><span class="s-num">12.4</span> Quantitative Risk Analysis</h2>
<p>Quantitative analysis numerically analyzes the effect of identified risks on project objectives. Used when more precise risk information is needed.</p>
<p><strong>Techniques:</strong></p>
<ul>
  <li><strong>Expected Monetary Value (EMV):</strong> EMV = Probability × Impact ($). Used in decision tree analysis.</li>
  <li><strong>Monte Carlo Simulation:</strong> Runs thousands of simulations using probability distributions to determine range of outcomes and confidence levels</li>
  <li><strong>Decision Tree Analysis:</strong> Diagrams that model alternative decisions and their outcomes, using EMV for each path</li>
  <li><strong>Sensitivity Analysis (Tornado Diagram):</strong> Shows which risks have the greatest potential impact on project objectives</li>
</ul>

<div class="formula-block">
  <div class="formula-label">Expected Monetary Value (EMV)</div>
  <div class="formula-expr">EMV = Probability × Impact ($)</div>
  <div class="formula-vars"><span>Positive EMV</span> = Opportunity &nbsp;|&nbsp; <span>Negative EMV</span> = Threat</div>
  <div class="formula-example">30% chance of $50K cost overrun: <strong>EMV = 0.30 × (−$50,000) = −$15,000</strong><br>
  40% chance of $20K savings opportunity: <strong>EMV = 0.40 × $20,000 = +$8,000</strong></div>
</div>

<h2 class="section-title" id="s-risk-response"><span class="s-num">12.5</span> Risk Response Planning</h2>

<div class="compare-grid">
  <div class="compare-col">
    <div class="compare-col-header">Threat Responses (Negative Risks)</div>
    <div class="compare-col-body">
      <ul>
        <li><strong>Avoid:</strong> Eliminate the threat by changing the project plan. Most aggressive response.</li>
        <li><strong>Transfer:</strong> Shift the negative impact to a third party (insurance, contract, outsourcing). Risk still exists but you're not responsible.</li>
        <li><strong>Mitigate:</strong> Reduce probability and/or impact of the risk to an acceptable threshold.</li>
        <li><strong>Accept:</strong> Acknowledge the risk and do nothing (active: contingency plan; passive: absorb if it occurs).</li>
        <li><strong>Escalate:</strong> Escalate to a higher level if beyond the project's authority.</li>
      </ul>
    </div>
  </div>
  <div class="compare-col">
    <div class="compare-col-header" style="background:#00695c;">Opportunity Responses (Positive Risks)</div>
    <div class="compare-col-body">
      <ul>
        <li><strong>Exploit:</strong> Ensure the opportunity happens. Assign best resources to make it certain.</li>
        <li><strong>Share:</strong> Share the opportunity with a third party better positioned to capture it.</li>
        <li><strong>Enhance:</strong> Increase probability and/or impact of the opportunity.</li>
        <li><strong>Accept:</strong> Be ready to take advantage if it occurs but don't actively pursue it.</li>
        <li><strong>Escalate:</strong> Escalate if the opportunity is beyond the project scope.</li>
      </ul>
    </div>
  </div>
</div>

<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Memory Aid — Risk Responses</div>
    <p><strong>Threats:</strong> <strong>ATMA</strong> + Escalate — Avoid, Transfer, Mitigate, Accept<br>
    <strong>Opportunities:</strong> <strong>ESEA</strong> + Escalate — Exploit, Share, Enhance, Accept<br>
    Note: <strong>Accept</strong> applies to BOTH threats and opportunities.</p>
  </div>
</div>

<h2 class="section-title" id="s-risk-monitor"><span class="s-num">12.6</span> Monitor & Control Risks</h2>
<p>Risk monitoring is <strong>ongoing throughout the project</strong>. Key activities:</p>
<ul>
  <li>Track identified risks and watch for trigger conditions</li>
  <li>Identify new risks as the project progresses</li>
  <li>Evaluate effectiveness of risk responses</li>
  <li>Conduct periodic risk reviews (often tied to project status meetings)</li>
  <li>Perform risk audits</li>
  <li>Review reserve adequacy (contingency and management)</li>
  <li>Update the risk register continuously</li>
</ul>
`;

<h2 class="section-title" id="s-quality-intro"><span class="s-num">13.1</span> Quality Concepts</h2>
<p>Quality in project management has two dimensions:</p>
<ul>
  <li><strong>Product quality:</strong> The degree to which the project's deliverables meet the requirements</li>
  <li><strong>Process quality:</strong> The degree to which project management processes are being followed correctly</li>
</ul>
<p>Key quality principles:</p>
<ul>
  <li><strong>Cost of Quality (CoQ):</strong> Total cost of quality work + cost of non-quality (rework, defects). Includes prevention costs, appraisal costs, internal failure costs, external failure costs.</li>
  <li><strong>Prevention over Inspection:</strong> It is always cheaper to prevent defects than to find and fix them. PMI strongly favors prevention.</li>
  <li><strong>Gold Plating:</strong> Adding features beyond what was requested. This is NOT good — it wastes resources and may introduce instability. PMI says DON'T gold plate.</li>
</ul>

        <li>Example: Testing software to find bugs before release</li>

<h2 class="section-title" id="s-team-development"><span class="s-num">14.1</span> Team Development — Tuckman's Ladder</h2>
<p>Tuckman's model describes five predictable stages that teams go through as they develop:</p>
<div class="principle-list">
  <div class="principle-item">
    <div class="principle-num">1</div>
    <div class="principle-content">

    </div>

    <div class="principle-num">2</div>
    <div class="principle-content">
      <h4>Storming</h4>
      <p>Conflicts emerge as work begins and personalities clash. Power struggles occur. PM must facilitate conflict resolution. Many teams get stuck here.</p>
    </div>
  </div>
  <div class="principle-item">
    <div class="principle-num">3</div>
    <div class="principle-content">
      <h4>Norming</h4>
      <p>Conflicts resolve, team norms and working relationships established. Increased collaboration and trust. PM steps back from directive role.</p>
    </div>
  </div>
  <div class="principle-item">
    <div class="principle-num">4</div>
    <div class="principle-content">
      <h4>Performing</h4>
      <p>Team is highly functional, motivated, and self-directed. PM delegates and focuses on facilitating. This is the goal!</p>
    </div>
  </div>
  <div class="principle-item">
    <div class="principle-num">5</div>
    <div class="principle-content">

<h2 class="section-title" id="s-leadership"><span class="s-num">14.2</span> Leadership Styles</h2>

<table>
  <tr><th>Style</th><th>Description</th><th>Best Used When</th></tr>
  <tr><td><strong>Directing</strong></td><td>PM tells team what to do and how. High task, low relationship.</td><td>New team, crisis, forming stage</td></tr>
  <tr><td><strong>Coaching</strong></td><td>PM explains decisions and invites questions. High task, high relationship.</td><td>Storming stage; developing skills</td></tr>
  <tr><td><strong>Supporting/Facilitating</strong></td><td>PM makes decisions with team; encourages. Low task, high relationship.</td><td>Norming stage; capable but uncertain team</td></tr>
  <tr><td><strong>Delegating</strong></td><td>PM hands off responsibility to team. Low task, low relationship.</td><td>Performing stage; highly capable, motivated team</td></tr>
  <tr><td><strong>Servant Leadership</strong></td><td>PM serves the team; removes obstacles; supports growth. Prevalent in Agile.</td><td>Agile/Scrum — Scrum Master role</td></tr>
  <tr><td><strong>Laissez-Faire</strong></td><td>PM gives complete freedom. No direction.</td><td>Expert teams with clear goals (rare, risky)</td></tr>
</table>
</div>

<h2 class="section-title" id="s-motivation"><span class="s-num">14.3</span> Motivation Theories</h2>
<div class="table-wrap">
<table>
  <tr><th>Theory</th><th>Author</th><th>Key Concept</th></tr>
  <tr>
    <td><strong>Hierarchy of Needs</strong></td>
    <td>Abraham Maslow</td>
    <td>Five-level hierarchy: Physiological → Safety → Social → Esteem → Self-Actualization. Lower needs must be satisfied before higher needs motivate.</td>
  </tr>
  <tr>
    <td><strong>Two-Factor Theory</strong></td>
    <td>Frederick Herzberg</td>
    <td>Hygiene factors (salary, working conditions) prevent dissatisfaction but don't motivate. Motivators (achievement, recognition, interesting work) create satisfaction.</td>
  </tr>
  <tr>
    <td><strong>Theory X and Theory Y</strong></td>
    <td>Douglas McGregor</td>
    <td>X: People dislike work, need control. Y: People are self-motivated, seek responsibility. PMI favors Theory Y. Agile teams assume Theory Y.</td>
  </tr>
  <tr>
    <td><strong>Expectancy Theory</strong></td>
    <td>Victor Vroom</td>
    <td>Motivation = Expectancy × Instrumentality × Valence. People are motivated when they believe effort leads to performance, performance leads to reward, and they value the reward.</td>
  </tr>
  <tr>
    <td><strong>Theory Z</strong></td>
    <td>William Ouchi</td>
    <td>Focus on organizational loyalty, collective decision-making, and long-term employment (Japanese management style).</td>
  </tr>
</table>
</div>

<h2 class="section-title" id="s-conflict"><span class="s-num">14.4</span> Conflict Resolution</h2>
<p>Conflict on project teams is normal and inevitable. The key is managing it constructively. PMI's preferred conflict resolution methods (in order of preference for lasting resolution):</p>
<div class="table-wrap">
<table>
  <tr><th>Technique</th><th>Approach</th><th>Result</th><th>PMI Preference</th></tr>
  <tr><td><strong>Problem-Solving / Confronting</strong></td><td>Address the conflict directly, find a mutually satisfying solution</td><td>Win-Win</td><td>⭐ BEST — most lasting</td></tr>
  <tr><td><strong>Collaborating</strong></td><td>Work together to find the best possible solution</td><td>Win-Win</td><td>⭐ Very good</td></tr>
  <tr><td><strong>Compromising</strong></td><td>Both parties give something up to reach agreement</td><td>Lose-Lose (partial)</td><td>OK — temporary solution</td></tr>
  <tr><td><strong>Smoothing / Accommodating</strong></td><td>Downplay differences, emphasize common ground</td><td>Lose-Win</td><td>Temporary, doesn't resolve root cause</td></tr>
  <tr><td><strong>Forcing / Directing</strong></td><td>One party imposes their view on others</td><td>Win-Lose</td><td>Poor — causes resentment</td></tr>
  <tr><td><strong>Withdrawing / Avoiding</strong></td><td>Retreat from the conflict, delay resolution</td><td>No resolution</td><td>Worst — conflict persists</td></tr>
</table>
</div>

<h2 class="section-title" id="s-resource-planning"><span class="s-num">14.5</span> Resource Planning</h2>
<p><strong>RACI Matrix</strong> (Responsibility Assignment Matrix) — Used to assign responsibilities for each task:</p>
<ul>
  <li><strong>R</strong> — Responsible: Does the work</li>
  <li><strong>A</strong> — Accountable: Owns the result (only one per task)</li>
  <li><strong>C</strong> — Consulted: Provides input (two-way communication)</li>
  <li><strong>I</strong> — Informed: Kept updated (one-way communication)</li>
</ul>
<p>Each work package should have exactly ONE "A" — the person who is ultimately accountable for the output.</p>
`;

<h2 class="section-title" id="s-comms-channels"><span class="s-num">15.2</span> Communication Channels Formula</h2>

<div class="formula-block">
  <div class="formula-label">Communication Channels</div>
  <div class="formula-expr">Channels = n × (n − 1) ÷ 2</div>
  <div class="formula-vars"><span>n</span> = number of stakeholders/people</div>
  <div class="formula-example">
    5 people: 5×4/2 = <strong>10 channels</strong><br>
    10 people: 10×9/2 = <strong>45 channels</strong><br>
    20 people: 20×19/2 = <strong>190 channels</strong><br>
    Adding just 1 more person to a team of 10 = 45 → 55 = <strong>10 more channels!</strong>
  </div>
</div>

<p>This formula demonstrates why communication complexity grows exponentially with team size, and why communication planning and management becomes increasingly critical on larger projects.</p>

<h2 class="section-title" id="s-comms-types"><span class="s-num">15.3</span> Types of Communication</h2>
<div class="table-wrap">

  </tr>

<h2 class="section-title" id="s-comms-barriers"><span class="s-num">15.4</span> Communication Barriers</h2>
<p>Communication barriers reduce the effectiveness of project communications. PMs must be aware of and actively mitigate these:</p>
<ul>
  <li><strong>Cultural differences:</strong> Different norms around directness, hierarchy, and decision-making</li>
  <li><strong>Language barriers:</strong> Different native languages or technical jargon</li>
  <li><strong>Physical distance:</strong> Remote/distributed teams lose the benefit of informal communication</li>
  <li><strong>Noise:</strong> Anything that distorts or disrupts the message (literal noise, distractions)</li>
  <li><strong>Perceptual differences:</strong> Different backgrounds lead to different interpretations</li>
  <li><strong>Lack of feedback loops:</strong> Sender assumes message was received and understood correctly</li>
  <li><strong>Information overload:</strong> Too much information makes important messages harder to identify</li>
</ul>

<h2 class="section-title" id="s-procurement-intro"><span class="s-num">16.1</span> Procurement Overview</h2>
<p>Procurement management covers the processes for acquiring goods and services from outside the project organization. It involves deciding what to buy, selecting vendors, and managing contracts.</p>
<p>Key terms:</p>
<ul>
  <li><strong>Buyer:</strong> The organization procuring goods/services (your organization)</li>
  <li><strong>Seller/Vendor/Contractor/Supplier:</strong> The organization providing goods/services</li>
  <li><strong>SOW (Statement of Work):</strong> Document describing the work to be performed under the contract</li>
  <li><strong>RFP (Request for Proposal):</strong> Solicitation document for complex services where approach and price are both evaluated</li>
  <li><strong>RFQ (Request for Quote):</strong> Solicitation for standard products/services based primarily on price</li>
  <li><strong>IFB (Invitation for Bid):</strong> Used for competitive sealed bidding (construction, government)</li>
</ul>

<h2 class="section-title" id="s-contract-types"><span class="s-num">16.2</span> Contract Types</h2>
<p>Contract type selection affects risk allocation between buyer and seller. Know these well!</p>
<div class="table-wrap">
<table>
  <tr>
    <th>Contract Type</th>
    <th>Abbreviation</th>
    <th>Who Bears Risk?</th>
    <th>Description</th>
    <th>Best Used When</th>
  </tr>
  <tr>
    <td><strong>Firm Fixed Price</strong></td>
    <td>FFP</td>
    <td>Seller bears most risk</td>
    <td>Seller delivers for a fixed price regardless of actual costs</td>
    <td>Scope is very well defined; low uncertainty</td>
  </tr>
  <tr>
    <td><strong>Fixed Price Incentive Fee</strong></td>
    <td>FPIF</td>
    <td>Shared risk</td>
    <td>Fixed price with incentive for beating targets. Includes Point of Total Assumption (PTA).</td>
    <td>Well-defined scope with room for performance incentives</td>
  </tr>
  <tr>
    <td><strong>Fixed Price Award Fee</strong></td>
    <td>FPAF</td>
    <td>Seller bears more</td>
    <td>Fixed price with subjective award fee based on performance</td>
    <td>When quality/performance standards are hard to quantify</td>
  </tr>
  <tr>
    <td><strong>Cost Plus Fixed Fee</strong></td>
    <td>CPFF</td>
    <td>Buyer bears most risk</td>
    <td>Buyer pays actual costs + fixed fee to seller</td>
    <td>Scope is unclear; R&D projects</td>
  </tr>
  <tr>
    <td><strong>Cost Plus Incentive Fee</strong></td>
    <td>CPIF</td>
    <td>Buyer bears most risk</td>
    <td>Buyer pays costs + incentive for meeting targets</td>
    <td>Long-duration projects where performance incentives are possible</td>
  </tr>
  <tr>
    <td><strong>Cost Plus Award Fee</strong></td>
    <td>CPAF</td>
    <td>Buyer bears most risk</td>
    <td>Buyer pays costs + subjective award fee</td>
    <td>When measurable targets cannot be defined upfront</td>
  </tr>
  <tr>
    <td><strong>Time & Materials</strong></td>
    <td>T&M</td>
    <td>Buyer bears risk</td>
    <td>Paid based on time spent and materials used. No fixed end price.</td>
    <td>Scope cannot be defined; staff augmentation</td>
  </tr>
</table>
</div>
<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Key Contract Rule</div>
    <p><strong>Fixed Price:</strong> Seller bears the risk (over budget = seller's problem). Best when scope is clear.<br>
    <strong>Cost Plus:</strong> Buyer bears the risk (over budget = buyer pays). Used when scope is unclear.<br>
    <strong>T&M:</strong> Buyer bears risk. No budget ceiling unless a "not to exceed" clause is included.</p>
  </div>
</div>

<h2 class="section-title" id="s-procurement-process"><span class="s-num">16.3</span> Procurement Process</h2>

  <div class="step-item">

<h2 class="section-title" id="s-when-predictive"><span class="s-num">17.1</span> When to Use Predictive</h2>
<p>The predictive approach is appropriate when:</p>
<ul>
  <li>Requirements are well understood and unlikely to change</li>
  <li>The technology and process are mature and well-understood</li>
  <li>The project is large with many dependencies requiring tight coordination</li>
  <li>Regulatory, legal, or contractual requirements mandate documentation and sequential approval</li>
  <li>Stakeholders prefer a fixed-price, defined-scope contract</li>
  <li>Risk is primarily around execution (not requirements uncertainty)</li>
</ul>
<p><strong>Classic examples:</strong> Construction, civil engineering, aerospace, manufacturing, large-scale IT infrastructure deployment, regulated industries (pharmaceutical, nuclear).</p>

<h2 class="section-title" id="s-predictive-planning"><span class="s-num">17.2</span> Predictive Planning Artifacts</h2>
<p>In a predictive approach, the project management plan is comprehensive and detailed. Key artifacts:</p>
<ul>
  <li><strong>Project Charter:</strong> Authorizes the project</li>
  <li><strong>Scope Statement:</strong> Detailed description of work, deliverables, exclusions</li>
  <li><strong>WBS + WBS Dictionary:</strong> Hierarchical decomposition of scope</li>
  <li><strong>Network Diagram:</strong> Activity sequencing and dependencies</li>
  <li><strong>Project Schedule (Gantt Chart):</strong> Timeline with milestones</li>
  <li><strong>Project Budget:</strong> Cost baseline + reserves</li>
  <li><strong>Risk Register:</strong> All identified risks with responses</li>
  <li><strong>Communications Plan:</strong> Stakeholder communication strategy</li>
  <li><strong>Quality Management Plan:</strong> Standards and QA/QC activities</li>
  <li><strong>Resource Management Plan:</strong> Team structure, roles, RACI</li>
</ul>

<h2 class="section-title" id="s-scope-baseline"><span class="s-num">17.3</span> Scope Baseline</h2>
<p>The <strong>scope baseline</strong> is the approved version of the project scope statement, WBS, and WBS dictionary. It is used for comparison to understand scope performance and to evaluate change requests.</p>
<p>The scope baseline can only be changed through the formal integrated change control process.</p>
<p><strong>Scope validation:</strong> The process of formalizing acceptance of completed deliverables. The customer/sponsor formally signs off that the deliverable meets the requirements. This is different from quality control (QC inspects, scope validation formally accepts).</p>

<h2 class="section-title" id="s-schedule-baseline"><span class="s-num">17.4</span> Schedule Baseline</h2>
<p>The approved version of the schedule model. Used to measure and report schedule performance. Key metrics:</p>
<ul>
  <li><strong>Schedule Variance (SV):</strong> EV − PV (negative = behind schedule)</li>
  <li><strong>Schedule Performance Index (SPI):</strong> EV / PV (&lt;1 = behind schedule)</li>
  <li><strong>On Critical Path:</strong> Zero float activities that cannot be delayed</li>
</ul>

<h2 class="section-title" id="s-cost-baseline"><span class="s-num">17.5</span> Cost Baseline</h2>
<p>The approved time-phased project budget, excluding management reserve. Used for monitoring and controlling cost performance.</p>
<p>The S-curve: When cumulative project costs are plotted over time, they typically form an S-shaped curve — slow start, rapid middle growth, slow end.</p>

<h2 class="section-title" id="s-integrated-change"><span class="s-num">17.6</span> Integrated Change Control</h2>
<p>All changes to any project baseline must go through <strong>Integrated Change Control</strong>. This process ensures changes are properly evaluated, authorized, and documented.</p>
<p><strong>Types of project changes:</strong></p>
<ul>
  <li><strong>Corrective Action:</strong> Work done to bring future performance back in line with the plan</li>
  <li><strong>Preventive Action:</strong> Work done to prevent anticipated problems from occurring</li>
  <li><strong>Defect Repair:</strong> Fixing identified defects in a component</li>
  <li><strong>Updates:</strong> Changes to formally controlled project documents</li>
</ul>
<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Corrective vs. Preventive Action</div>
    <p><strong>Corrective:</strong> Project is off track — bring it BACK to the plan. (Past problem, present fix)<br>
    <strong>Preventive:</strong> Problem hasn't happened yet — act now to PREVENT it from happening. (Future problem, present prevention)</p>
  </div>
</div>

<h2 class="section-title" id="s-project-controls"><span class="s-num">17.7</span> Project Controls</h2>
<p>Project controls are the systems and processes used to measure project performance, identify variances, and initiate corrective actions. Key controls in predictive projects:</p>
<ul>
  <li><strong>Status Meetings:</strong> Regular reviews of progress against plan</li>
  <li><strong>Status Reports:</strong> Formal written communications of project performance</li>
  <li><strong>EVM Analysis:</strong> SV, CV, SPI, CPI, EAC, ETC — see Chapter 11</li>
  <li><strong>Variance Analysis:</strong> Comparing actual vs. planned performance to identify and understand deviations</li>
  <li><strong>Trend Analysis:</strong> Examining project results over time to determine whether performance is improving or deteriorating</li>
  <li><strong>Change Log:</strong> Tracking all change requests and their status</li>
  <li><strong>Issue Log:</strong> Tracking unresolved problems that need attention</li>
</ul>
`;

  <li><strong>ETC (Estimate To Complete):</strong> Forecast of remaining cost to complete the project</li>

<h2 class="section-title" id="s-all-formulas"><span class="s-num">18.4</span> Complete Formula Reference</h2>

<div class="callout exam">

  <div class="callout-body">
    <div class="callout-title">Exam Alert — Calculation Questions</div>
    <p>The CAPM exam typically includes 5–10 EVM calculation questions. No calculator is provided — questions are designed for mental math. Memorize all formulas. The most tested: <strong>SV, CV, SPI, CPI, and EAC = BAC/CPI.</strong></p>

<div class="subsection-title">EVM Core Variables</div>
<div class="formula-block">
  <div class="formula-label">Planned Value (PV) — What should be done?</div>
  <div class="formula-expr">PV = BAC × % Planned Complete</div>
</div>
<div class="formula-block">
  <div class="formula-label">Earned Value (EV) — What was actually done?</div>
  <div class="formula-expr">EV = BAC × % Actual Complete</div>
</div>
<div class="formula-block">
  <div class="formula-label">Actual Cost (AC) — What did it cost?</div>
  <div class="formula-expr">AC = Actual cost incurred for work performed</div>
</div>

<div class="subsection-title">Variance Formulas (Absolute — dollar amounts)</div>
<div class="formula-block">
  <div class="formula-label">Schedule Variance (SV)</div>
  <div class="formula-expr">SV = EV − PV</div>
  <div class="formula-vars"><span>+</span> = Ahead of schedule &nbsp;|&nbsp; <span>0</span> = On schedule &nbsp;|&nbsp; <span>−</span> = Behind schedule &nbsp;|&nbsp; Ends at 0 when project completes</div>
</div>
<div class="formula-block">
  <div class="formula-label">Cost Variance (CV)</div>
  <div class="formula-expr">CV = EV − AC</div>
  <div class="formula-vars"><span>+</span> = Under budget &nbsp;|&nbsp; <span>0</span> = On budget &nbsp;|&nbsp; <span>−</span> = Over budget</div>
</div>

<div class="subsection-title">Performance Index Formulas (Efficiency ratios)</div>
<div class="formula-block">
  <div class="formula-label">Schedule Performance Index (SPI)</div>
  <div class="formula-expr">SPI = EV ÷ PV</div>
  <div class="formula-vars"><span>&gt;1</span> = Ahead &nbsp;|&nbsp; <span>=1</span> = On track &nbsp;|&nbsp; <span>&lt;1</span> = Behind &nbsp;|&nbsp; Ends at 1.0 when project completes</div>
</div>
<div class="formula-block">
  <div class="formula-label">Cost Performance Index (CPI)</div>
  <div class="formula-expr">CPI = EV ÷ AC</div>
  <div class="formula-vars"><span>&gt;1</span> = Under budget &nbsp;|&nbsp; <span>=1</span> = On budget &nbsp;|&nbsp; <span>&lt;1</span> = Over budget &nbsp;|&nbsp; MOST IMPORTANT EVM metric</div>
</div>

<div class="subsection-title">Forecasting Formulas</div>
<div class="formula-block">
  <div class="formula-label">EAC — CPI continues (most used)</div>
  <div class="formula-expr">EAC = BAC ÷ CPI</div>
</div>
<div class="formula-block">
  <div class="formula-label">EAC — Variance was atypical</div>
  <div class="formula-expr">EAC = AC + (BAC − EV)</div>
</div>
<div class="formula-block">
  <div class="formula-label">EAC — Both SPI and CPI will continue</div>
  <div class="formula-expr">EAC = AC + [(BAC − EV) ÷ (CPI × SPI)]</div>
</div>
<div class="formula-block">
  <div class="formula-label">Estimate To Complete (ETC)</div>
  <div class="formula-expr">ETC = EAC − AC</div>
</div>
<div class="formula-block">
  <div class="formula-label">Variance At Completion (VAC)</div>
  <div class="formula-expr">VAC = BAC − EAC</div>
</div>
<div class="formula-block">
  <div class="formula-label">TCPI — Must achieve this CPI on remaining work</div>
  <div class="formula-expr">TCPI = (BAC − EV) ÷ (BAC − AC)</div>
</div>

<div class="subsection-title">Schedule Formulas</div>
<div class="formula-block">
  <div class="formula-label">Float / Slack</div>
  <div class="formula-expr">Float = LS − ES &nbsp;&nbsp;OR&nbsp;&nbsp; Float = LF − EF</div>
  <div class="formula-vars">Critical path: Float = <span>0</span></div>
</div>
<div class="formula-block">
  <div class="formula-label">PERT Expected Duration</div>
  <div class="formula-expr">te = (O + 4M + P) ÷ 6</div>
</div>
<div class="formula-block">
  <div class="formula-label">PERT Standard Deviation</div>
  <div class="formula-expr">σ = (P − O) ÷ 6</div>
</div>

<div class="subsection-title">Communications</div>
<div class="formula-block">
  <div class="formula-label">Communication Channels</div>
  <div class="formula-expr">Channels = n × (n − 1) ÷ 2</div>
</div>

<div class="subsection-title">Risk</div>
<div class="formula-block">
  <div class="formula-label">Expected Monetary Value (EMV)</div>
  <div class="formula-expr">EMV = Probability × Impact ($)</div>
  <div class="formula-vars"><span>Positive EMV</span> = Opportunity &nbsp;|&nbsp; <span>Negative EMV</span> = Threat</div>
</div>

<div class="subsection-title">Finance / Project Selection</div>
<div class="formula-block">
  <div class="formula-label">Benefit Cost Ratio (BCR)</div>
  <div class="formula-expr">BCR = Benefits ÷ Costs &nbsp;&nbsp;(>1 = good investment)</div>
</div>
<div class="formula-block">
  <div class="formula-label">Return on Investment (ROI)</div>
  <div class="formula-expr">ROI = (Net Benefits ÷ Costs) × 100%</div>
</div>
`;

<h2 class="section-title" id="s-agile-mindset"><span class="s-num">19.3</span> Agile Mindset</h2>

<h2 class="section-title" id="s-scrum-intro"><span class="s-num">20.1</span> Scrum Overview</h2>
<p><strong>Scrum</strong> is a lightweight framework for developing, delivering, and sustaining complex products. It is built on three pillars — <strong>Transparency, Inspection, and Adaptation</strong> — and five values: <strong>Commitment, Courage, Focus, Openness, and Respect</strong>.</p>
<p>Scrum organizes work into fixed-length iterations called <strong>Sprints</strong> (1–4 weeks). Each sprint produces a potentially shippable product increment.</p>

<h2 class="section-title" id="s-sprint-detail"><span class="s-num">20.5</span> The Sprint in Detail</h2>
<p>A Sprint is the heartbeat of Scrum. Key Sprint rules:</p>
<ul>
  <li>Sprints are <strong>timeboxed</strong> — they have a fixed end date that does not change</li>
  <li>The sprint length is consistent — you don't extend sprints when behind</li>
  <li>No changes to the Sprint Backlog that would endanger the Sprint Goal are made during the sprint</li>
  <li>Scope may be clarified between PO and Dev Team as more is learned</li>
  <li>Only the Product Owner can cancel a sprint (rare — only if Sprint Goal becomes obsolete)</li>
  <li>Each sprint is like a mini-project: planning → execution → review → retrospective</li>
</ul>

<p><strong>Agile estimation methods:</strong></p>
<ul>
  <li><strong>Story Points:</strong> Relative estimation of effort, complexity, and uncertainty (not hours). Team assigns points using Fibonacci sequence (1, 2, 3, 5, 8, 13, 21...).</li>
  <li><strong>Planning Poker:</strong> Team members independently estimate and reveal simultaneously, then discuss differences. Reduces anchoring bias.</li>
  <li><strong>T-Shirt Sizing:</strong> XS, S, M, L, XL — quick relative sizing for backlog refinement.</li>
  <li><strong>Velocity:</strong> Story points completed per sprint. Used to forecast future sprints.</li>
  <li><strong>Burndown Chart:</strong> Shows remaining work over time within a sprint or release.</li>
  <li><strong>Burnup Chart:</strong> Shows completed work over time. Better for showing scope changes.</li>
</ul>

        <li>No blockers outstanding</li>

<h2 class="section-title" id="s-kanban"><span class="s-num">21.1</span> Kanban Framework</h2>
<p><strong>Kanban</strong> is a visual workflow management method originating from Toyota's lean manufacturing system. It focuses on continuous flow rather than fixed iterations.</p>
<p><strong>Core Kanban principles:</strong></p>
<ul>
  <li><strong>Visualize the workflow:</strong> All work is visible on a Kanban board (columns = workflow stages)</li>
  <li><strong>Limit Work in Progress (WIP):</strong> Each column has a maximum number of items. When full, team must finish before starting new work. Reveals bottlenecks.</li>
  <li><strong>Manage flow:</strong> Focus on smooth, continuous flow from start to completion</li>
  <li><strong>Make policies explicit:</strong> Clearly document how work moves through the system</li>
  <li><strong>Implement feedback loops:</strong> Regular reviews and retrospectives</li>
  <li><strong>Improve collaboratively:</strong> Continuous, incremental improvement</li>
</ul>
<p><strong>Kanban vs. Scrum comparison:</strong></p>
<div class="table-wrap">
<table>
  <tr><th>Aspect</th><th>Scrum</th><th>Kanban</th></tr>
  <tr><td>Cadence</td><td>Fixed sprints (1–4 weeks)</td><td>Continuous flow, no fixed iterations</td></tr>
  <tr><td>Roles</td><td>PO, SM, Dev Team (defined)</td><td>No prescribed roles</td></tr>
  <tr><td>Change</td><td>No changes during sprint</td><td>Changes welcome at any time</td></tr>
  <tr><td>Estimation</td><td>Story points, velocity</td><td>Cycle time, lead time</td></tr>
  <tr><td>Metrics</td><td>Velocity, burndown</td><td>Cycle time, lead time, throughput, cumulative flow</td></tr>
  <tr><td>Best for</td><td>Feature development, new products</td><td>Maintenance, support, operational work</td></tr>
  <tr><td>Retrospective</td><td>End of every sprint</td><td>When needed</td></tr>
</table>
</div>

<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Kanban Bottleneck Exam Tip</div>
    <p>If a Kanban board shows items piling up in one column, the correct response is to <strong>stop starting new work and help clear the bottleneck</strong>. This is called "Stop Starting, Start Finishing." Never raise the WIP limit as a first response — that defeats the purpose.</p>
  </div>
</div>

<h2 class="section-title" id="s-xp"><span class="s-num">21.2</span> Extreme Programming (XP)</h2>
<p><strong>XP</strong> is an agile framework focused on improving software quality and responsiveness to changing requirements. It emphasizes technical excellence.</p>
<p><strong>Key XP practices:</strong></p>
<ul>
  <li><strong>Test-Driven Development (TDD):</strong> Write tests BEFORE writing the code. Code is written to pass the tests.</li>
  <li><strong>Pair Programming:</strong> Two developers work together at one workstation — one codes, one reviews. Improves quality and knowledge sharing.</li>
  <li><strong>Continuous Integration:</strong> Developers frequently merge code changes into a shared repository. Automated tests run immediately.</li>
  <li><strong>Refactoring:</strong> Continuously improving the structure of existing code without changing its behavior</li>
  <li><strong>Simple Design:</strong> Design only what is needed today — no gold plating</li>
  <li><strong>Small Releases:</strong> Deliver working software frequently in small increments</li>
  <li><strong>Collective Code Ownership:</strong> Any team member can modify any part of the codebase</li>
  <li><strong>Sustainable Pace:</strong> Teams should work at a pace they can sustain indefinitely (no overtime/crunch)</li>
</ul>

<h2 class="section-title" id="s-lean"><span class="s-num">21.3</span> Lean Principles</h2>
<p><strong>Lean</strong> originated in Toyota's manufacturing system. It focuses on maximizing value and eliminating waste.</p>
<p><strong>7 Types of Waste (Muda) in Lean:</strong></p>
<ol>
  <li><strong>Transport:</strong> Moving items unnecessarily</li>
  <li><strong>Inventory:</strong> Storing more than needed right now</li>
  <li><strong>Motion:</strong> Unnecessary movement of people</li>
  <li><strong>Waiting:</strong> Idle time waiting for next step</li>
  <li><strong>Overproduction:</strong> Producing more than needed</li>
  <li><strong>Over-processing:</strong> More work than the customer requires</li>
  <li><strong>Defects:</strong> Errors requiring rework or scrapping</li>
</ol>
<p><strong>In software/knowledge work, Lean waste includes:</strong> Partially done work, extra features, relearning, handoffs, task switching, delays, defects.</p>

<h2 class="section-title" id="s-safe"><span class="s-num">21.4</span> Scaled Agile (SAFe Overview)</h2>
<p><strong>SAFe (Scaled Agile Framework)</strong> provides a structured approach for applying agile principles across large enterprises with multiple teams.</p>
<p><strong>Key SAFe concepts for the CAPM:</strong></p>
<ul>
  <li><strong>Agile Release Train (ART):</strong> A long-lived team of agile teams (typically 50–125 people) that plans, commits, and executes together</li>
  <li><strong>PI Planning:</strong> Program Increment Planning — a cadence-based event where all ART teams plan their next 8–12 weeks together</li>
  <li><strong>Program Increment (PI):</strong> A timebox (typically 10 weeks) containing multiple sprints, ending with an Inspect & Adapt event</li>
  <li>SAFe levels: Team, Program, Large Solution, Portfolio</li>
</ul>

<h2 class="section-title" id="s-hybrid-agile"><span class="s-num">21.5</span> Hybrid Agile Approaches</h2>
<p>Most real-world projects use some form of hybrid approach — combining predictive and adaptive elements based on project needs:</p>
<div class="table-wrap">
<table>
  <tr><th>Hybrid Pattern</th><th>Description</th><th>When to Use</th></tr>
  <tr>
    <td><strong>Waterfall + Agile</strong></td>
    <td>Predictive planning, governance, and milestones with agile development iterations within phases</td>
    <td>Organizations transitioning to agile; complex stakeholder environments</td>
  </tr>
  <tr>
    <td><strong>Fixed Scope + Agile Delivery</strong></td>
    <td>Scope defined upfront (contract requirement) but delivered in iterative sprints</td>
    <td>Government contracts; when clients require fixed price</td>
  </tr>
  <tr>
    <td><strong>Scrumban</strong></td>
    <td>Combines Scrum's cadence with Kanban's WIP limits and flow management</td>
    <td>Teams transitioning between frameworks; mixed maintenance + development work</td>
  </tr>
  <tr>
    <td><strong>Agile at Team + Predictive at Portfolio</strong></td>
    <td>Teams work in sprints; program/portfolio level uses waterfall gates and reporting</td>
    <td>Large enterprises with executive reporting requirements</td>
  </tr>
</table>
</div>
`;

<h2 class="section-title" id="s-ba-stakeholder"><span class="s-num">22.2</span> Stakeholder Communication in BA</h2>

  <li><strong>Documentation:</strong> Recording requirements in appropriate formats (use cases, user stories, process flows)</li>

</ul>

<h2 class="section-title" id="s-requirements-types"><span class="s-num">22.4</span> Types of Requirements</h2>
<div class="table-wrap">

  <tr>

    <td>What the system or product should DO — features, behaviors, functions</td>
    <td>"The system shall allow users to filter products by price, category, and rating"</td>
  </tr>
  <tr>
    <td><strong>Non-Functional Requirements</strong></td>

    <td><strong>Transition Requirements</strong></td>

  </tr>
  <tr>
    <td><strong>Quality Requirements</strong></td>
    <td>Conditions or criteria that validate the successful completion of a project objective</td>
    <td>"System must have 99.9% uptime"; "Maximum 0.1% defect rate"</td>
  </tr>
  <tr>
    <td><strong>Constraint Requirements</strong></td>

<h2 class="section-title" id="s-product-roadmap"><span class="s-num">22.5</span> Product Roadmaps</h2>
<p>A <strong>product roadmap</strong> is a high-level visual plan that maps out the product vision, direction, priorities, and progress over time. It communicates the strategic plan for product development to all stakeholders.</p>
<p><strong>Key characteristics:</strong></p>
<ul>
  <li>Strategic-level document — NOT a detailed project schedule</li>
  <li>Shows planned features, themes, and releases over time horizons (quarters, years)</li>
  <li>Helps stakeholders understand the product direction without overwhelming detail</li>
  <li>Evolves — roadmaps are reviewed and updated regularly, especially in agile environments</li>
  <li>Aligns executives, customers, development teams, and other stakeholders around a shared vision</li>
</ul>
<p><strong>Types of roadmaps:</strong></p>
<ul>
  <li><strong>Theme-based:</strong> Organized around strategic goals or customer outcomes rather than specific features</li>
  <li><strong>Feature-based:</strong> Shows specific features and release dates (more predictive)</li>
  <li><strong>Time-based:</strong> Shows what will be delivered in each time period</li>
  <li><strong>Now-Next-Later:</strong> Agile format showing priorities without fixed dates</li>
</ul>

<h2 class="section-title" id="s-use-cases"><span class="s-num">22.6</span> Use Cases & User Stories</h2>

<div class="subsection-title">Use Cases</div>
<p>A <strong>use case</strong> describes a specific interaction between an actor (user or system) and the system to accomplish a goal. Use cases are more formal and detailed than user stories.</p>
<p><strong>Use case components:</strong></p>
<ul>
  <li><strong>Actor:</strong> Who interacts with the system (person, role, or external system)</li>
  <li><strong>Goal:</strong> What the actor is trying to accomplish</li>
  <li><strong>Preconditions:</strong> What must be true before the use case begins</li>
  <li><strong>Main Flow:</strong> The sequence of steps in the normal, successful scenario</li>
  <li><strong>Alternative Flows:</strong> Variations or exceptions to the main flow</li>
  <li><strong>Postconditions:</strong> What is true when the use case successfully completes</li>
</ul>

<div class="subsection-title">User Stories</div>
<p>A <strong>user story</strong> is a short, simple description of a feature from the perspective of the end user. User stories are the primary unit of work in agile development.</p>
<p><strong>Standard format:</strong></p>
<div class="formula-block">
  <div class="formula-label">User Story Format</div>
  <div class="formula-expr">As a [type of user], I want [some goal] so that [some reason/benefit].</div>
  <div class="formula-example">Example: <strong>"As a registered customer, I want to save items to a wishlist so that I can purchase them later."</strong></div>
</div>
<p><strong>INVEST criteria for good user stories:</strong></p>
<ul>
  <li><strong>I</strong>ndependent — can be developed separately</li>
  <li><strong>N</strong>egotiable — scope can be discussed</li>
  <li><strong>V</strong>aluable — delivers value to the user</li>
  <li><strong>E</strong>stimable — team can estimate effort</li>
  <li><strong>S</strong>mall — fits in one sprint</li>
  <li><strong>T</strong>estable — acceptance criteria can be verified</li>
</ul>

<p><strong>Acceptance Criteria:</strong> Conditions that must be met for the story to be considered done. Written from the user's perspective. Used in Definition of Done and testing.</p>

<p><strong>Epic:</strong> A large user story that is too big for one sprint and needs to be broken down into smaller stories.</p>

<h2 class="section-title" id="s-rtm"><span class="s-num">22.7</span> Requirements Traceability Matrix (RTM)</h2>
<p>The <strong>RTM</strong> is a document that links requirements throughout the project lifecycle — from their origin (business need) through design, development, testing, and delivery.</p>
<p><strong>Purpose:</strong></p>
<ul>
  <li>Ensures all requirements are addressed in the solution</li>
  <li>Prevents requirements from being "lost" during development</li>
  <li>Provides a basis for scope validation and change impact analysis</li>
  <li>Supports testing by linking requirements to test cases</li>
  <li>Provides traceability for audit and compliance purposes</li>
</ul>
<p><strong>Typical RTM columns:</strong> Requirement ID | Requirement Description | Source/Origin | Business Objective | Design Element | Test Case | Status</p>

<h2 class="section-title" id="s-ba-validation"><span class="s-num">22.8</span> Requirements Validation</h2>
<p>Requirements validation confirms that requirements are correct, complete, and aligned with the business need before development begins (and throughout development in agile).</p>
<p><strong>Validation techniques:</strong></p>
<ul>
  <li><strong>Reviews and walkthroughs:</strong> Team reviews documented requirements with stakeholders</li>
  <li><strong>Prototyping:</strong> Building mockups to validate understanding</li>
  <li><strong>Testing:</strong> Writing and running acceptance tests against requirements</li>
  <li><strong>Demonstrations:</strong> In agile, Sprint Reviews demonstrate working software against requirements</li>
  <li><strong>Sign-off:</strong> Formal stakeholder approval confirms requirements are correct</li>
</ul>
<p><strong>Verification vs. Validation:</strong></p>
<ul>
  <li><strong>Verification:</strong> "Are we building the product RIGHT?" — Does it meet specifications?</li>
  <li><strong>Validation:</strong> "Are we building the RIGHT product?" — Does it meet the business need?</li>
</ul>

<h2 class="section-title" id="s-feasibility"><span class="s-num">22.9</span> Feasibility Analysis</h2>
<p>A <strong>feasibility study</strong> is conducted before committing to a project to determine whether it is viable. It examines multiple dimensions:</p>
<div class="table-wrap">
<table>
  <tr><th>Feasibility Type</th><th>Key Question</th><th>What It Examines</th></tr>
  <tr>
    <td><strong>Technical Feasibility</strong></td>
    <td>Can we build it?</td>
    <td>Technology availability, skills, infrastructure requirements, technical risk</td>
  </tr>
  <tr>
    <td><strong>Economic/Financial Feasibility</strong></td>
    <td>Is it worth building?</td>
    <td>Cost-benefit analysis, ROI, NPV, payback period, opportunity cost</td>
  </tr>
  <tr>
    <td><strong>Organizational Feasibility</strong></td>
    <td>Can the organization support it?</td>
    <td>Culture, change readiness, management support, capacity</td>
  </tr>
  <tr>
    <td><strong>Operational Feasibility</strong></td>
    <td>Will it work in practice?</td>
    <td>Process changes, user adoption, ongoing support requirements</td>
  </tr>
  <tr>
    <td><strong>Legal/Regulatory Feasibility</strong></td>
    <td>Is it compliant?</td>
    <td>Legal requirements, compliance, regulatory approval processes</td>
  </tr>
  <tr>
    <td><strong>Schedule Feasibility</strong></td>
    <td>Can we do it in time?</td>
    <td>Realistic timelines, resource availability, deadline risks</td>
  </tr>
</table>
</div>
`;

<p><strong>AI applications in project management:</strong></p>
<ul>

  <li><strong>Pattern recognition:</strong> AI identifies patterns across multiple projects to surface insights the PM might miss</li>
</ul>
<p><strong>Key consideration:</strong> AI augments the PM's capabilities — it does not replace human judgment, ethics, stakeholder relationships, and leadership. The PM remains accountable for all project decisions.</p>

<h2 class="section-title" id="s-digital-transform"><span class="s-num">23.2</span> Digital Transformation</h2>
<p><strong>Digital transformation</strong> refers to the organizational change process of integrating digital technology into all areas of a business, fundamentally changing how it operates and delivers value to customers.</p>
<p><strong>Implications for project management:</strong></p>
<ul>
  <li>Projects are increasingly technology-driven and cross-functional</li>
  <li>Agile and hybrid approaches are preferred for digital transformation initiatives</li>
  <li>Data analytics inform project decisions at all levels</li>
  <li>Collaboration tools (Jira, Slack, Teams, Miro) change how teams communicate</li>
  <li>Remote and distributed teams are common — communication planning becomes critical</li>
  <li>Security and privacy (GDPR, etc.) are project constraints that cannot be ignored</li>
  <li>Change management is a central competency — technical solutions often succeed or fail based on human adoption</li>
</ul>

<h2 class="section-title" id="s-pmo-maturity"><span class="s-num">23.3</span> PMO Roles & Maturity Models</h2>
<p>The PMO's role has evolved from administrative oversight to strategic partner. Modern PMOs focus on value delivery, not just compliance.</p>

<h2 class="section-title" id="s-exam-strategy"><span class="s-num">24.3</span> Exam Strategy & Tips</h2>

<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">The Golden Rule of CAPM Exam Questions</div>
    <p>Always answer from the <strong>PMI perspective</strong> — not from your personal work experience. PMI's ideal PM is proactive, communicates constantly, follows processes, and always puts the project's best interests first.</p>
  </div>
</div>

<div class="subsection-title">During the Exam</div>
<ul>
  <li><strong>Read every word of the question:</strong> CAPM questions often contain critical qualifying words like "FIRST," "BEST," "MOST appropriate," "LEAST likely." These change the answer entirely.</li>
  <li><strong>Eliminate wrong answers:</strong> Usually 2 options are clearly wrong. Focus on choosing between the remaining 2.</li>
  <li><strong>Watch for absolute language:</strong> Options with "always," "never," "only," "all" are usually wrong.</li>
  <li><strong>When two answers seem correct:</strong> Choose the one that is MORE proactive, MORE communication-focused, or MORE aligned with PMI's values.</li>
  <li><strong>Mark and skip:</strong> If you're unsure, mark the question and come back. Don't let one difficult question eat up 5 minutes.</li>
  <li><strong>Time management:</strong> 150 questions in 180 minutes = 72 seconds per question. Check your progress at question 50 (60 min), 100 (120 min).</li>
  <li><strong>Don't change answers:</strong> Research shows first instinct is usually correct. Only change if you find a clear reason to.</li>
</ul>

<div class="subsection-title">Common Exam Traps</div>
<div class="table-wrap">
<table>
  <tr><th>Trap</th><th>What to Do Instead</th></tr>
  <tr><td>PM should "just fix it" without telling anyone</td><td>Always communicate issues to the sponsor/team first before acting unilaterally</td></tr>
  <tr><td>The sponsor adds scope verbally — just do it</td><td>All scope changes go through formal change control, even from the sponsor</td></tr>
  <tr><td>Team conflict — ignore it and hope it goes away</td><td>Address conflict directly and immediately using problem-solving/confronting</td></tr>
  <tr><td>Behind schedule — work overtime to catch up</td><td>Analyze root cause, update the plan, notify stakeholders, consider crashing or fast tracking</td></tr>
  <tr><td>New risk found — fix it immediately without documenting</td><td>Always add to the risk register, perform analysis, then respond appropriately</td></tr>
  <tr><td>Project is over budget but CPI is fine — nothing to do</td><td>Investigate — actual budget overrun needs explanation and corrective action</td></tr>
</table>
</div>

<h2 class="section-title" id="s-quick-reference"><span class="s-num">24.4</span> Quick Reference Sheet</h2>

<div class="subsection-title">Must-Know Formulas</div>
<div class="formula-block">
  <div class="formula-label">The 12 EVM Formulas — Memorize These</div>
  <div class="formula-expr">EV = BAC × % Complete</div>
  <div class="formula-expr" style="margin-top:6px;">SV = EV − PV &nbsp;&nbsp;|&nbsp;&nbsp; CV = EV − AC</div>
  <div class="formula-expr" style="margin-top:6px;">SPI = EV / PV &nbsp;&nbsp;|&nbsp;&nbsp; CPI = EV / AC</div>
  <div class="formula-expr" style="margin-top:6px;">EAC = BAC / CPI &nbsp;&nbsp;|&nbsp;&nbsp; EAC = AC + (BAC − EV)</div>
  <div class="formula-expr" style="margin-top:6px;">ETC = EAC − AC &nbsp;&nbsp;|&nbsp;&nbsp; VAC = BAC − EAC</div>
  <div class="formula-expr" style="margin-top:6px;">TCPI = (BAC−EV) / (BAC−AC)</div>
  <div class="formula-expr" style="margin-top:6px;">PERT: te = (O+4M+P)/6 &nbsp;&nbsp;|&nbsp;&nbsp; σ = (P−O)/6</div>
  <div class="formula-expr" style="margin-top:6px;">Channels = n(n−1)/2 &nbsp;&nbsp;|&nbsp;&nbsp; EMV = P × I</div>
</div>
