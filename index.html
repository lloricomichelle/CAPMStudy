```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPM Complete Study Book 2026</title>
<style>
:root {
  --toc-width: 320px;
  --header-h: 56px;
  --primary: #1a237e;
  --primary-light: #3949ab;
  --accent: #0277bd;
  --text: #1a1a1a;
  --text-light: #4a4a4a;
  --text-muted: #767676;
  --bg: #f7f6f3;
  --bg-card: #ffffff;
  --border: #e0ddd6;
  --toc-bg: #fafaf8;
  --highlight-yellow: #fffde7;
  --highlight-blue: #e3f2fd;
  --highlight-green: #e8f5e9;
  --highlight-orange: #fff3e0;
  --highlight-red: #fce4ec;
  --highlight-purple: #f3e5f5;
  --formula-bg: #1a1a2e;
  --callout-note: #e3f2fd;
  --callout-note-border: #1976d2;
  --callout-tip: #e8f5e9;
  --callout-tip-border: #388e3c;
  --callout-warn: #fff3e0;
  --callout-warn-border: #f57c00;
  --callout-exam: #fce4ec;
  --callout-exam-border: #c62828;
  --font-body: 'Georgia', 'Times New Roman', serif;
  --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-code: 'Courier New', 'Courier', monospace;
  --line-height: 1.85;
  --max-content: 860px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c5c1b8; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #a09a90; }

/* ─────────────────────────────────────────────
   TOP HEADER
───────────────────────────────────────────── */
#topbar {
  height: var(--header-h);
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.topbar-logo {
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-logo span {
  background: rgba(255,255,255,0.15);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.topbar-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }

.topbar-breadcrumb {
  font-family: var(--font-ui);
  font-size: 13px;
  opacity: 0.75;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.topbar-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.topbar-btn:hover { background: rgba(255,255,255,0.22); }

#toc-toggle-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
#toc-toggle-btn:hover { background: rgba(255,255,255,0.25); }

/* Search bar in header */
.header-search {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 0 10px;
  gap: 6px;
}
.header-search input {
  background: transparent;
  border: none;
  color: #fff;
  font-family: var(--font-ui);
  font-size: 13px;
  outline: none;
  width: 180px;
  padding: 6px 0;
}
.header-search input::placeholder { color: rgba(255,255,255,0.5); }
.header-search span { opacity: 0.6; font-size: 14px; }

/* ─────────────────────────────────────────────
   LAYOUT
───────────────────────────────────────────── */
#layout {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ─────────────────────────────────────────────
   TABLE OF CONTENTS (RIGHT SIDEBAR)
───────────────────────────────────────────── */
#toc-panel {
  width: var(--toc-width);
  background: var(--toc-bg);
  border-left: 1px solid var(--border);
  position: fixed;
  top: var(--header-h);
  right: 0;
  bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 100;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

#toc-panel.hidden { transform: translateX(100%); }

.toc-header {
  padding: 16px 18px 12px;
  border-bottom: 2px solid var(--border);
  background: var(--toc-bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

.toc-header h2 {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.toc-search {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0 8px;
  gap: 5px;
}
.toc-search input {
  border: none;
  background: transparent;
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 6px 0;
  outline: none;
  width: 100%;
  color: var(--text);
}
.toc-search span { color: var(--text-muted); font-size: 13px; }

/* TOC Tree */
.toc-tree { padding: 8px 0 40px; }

.toc-part {
  margin: 0;
}

.toc-part-label {
  padding: 14px 18px 6px;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
  background: var(--toc-bg);
  display: flex;
  align-items: center;
  gap: 6px;
}

.toc-part-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Chapter items */
.toc-chapter {
  display: block;
}

.toc-chapter-btn {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 18px 8px 14px;
  background: transparent;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  transition: background 0.15s;
  border-left: 3px solid transparent;
  line-height: 1.4;
}

.toc-chapter-btn:hover {
  background: rgba(26,35,126,0.05);
  color: var(--primary);
}

.toc-chapter-btn.active {
  background: rgba(26,35,126,0.07);
  border-left-color: var(--primary);
  color: var(--primary);
}

.toc-chapter-btn .ch-num {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 22px;
  padding-top: 1px;
  font-weight: 700;
}

.toc-chapter-btn .ch-arrow {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
  padding-top: 2px;
}

.toc-chapter-btn.open .ch-arrow { transform: rotate(90deg); }

/* Section items under a chapter */
.toc-sections {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.toc-sections.open { max-height: 2000px; }

.toc-section-btn {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 18px 5px 42px;
  background: transparent;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-light);
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
  line-height: 1.4;
}

.toc-section-btn:hover {
  background: rgba(26,35,126,0.04);
  color: var(--primary);
}

.toc-section-btn.active {
  color: var(--accent);
  font-weight: 600;
  border-left-color: var(--accent);
  background: rgba(2,119,189,0.05);
}

.toc-section-btn::before {
  content: '·';
  font-size: 16px;
  line-height: 1;
  margin-top: -1px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ─────────────────────────────────────────────
   MAIN CONTENT AREA
───────────────────────────────────────────── */
#content-area {
  flex: 1;
  margin-right: var(--toc-width);
  transition: margin-right 0.3s ease;
  min-height: calc(100vh - var(--header-h));
}

#content-area.toc-hidden { margin-right: 0; }

#book-page {
  max-width: var(--max-content);
  margin: 0 auto;
  padding: 48px 56px 120px;
}

/* ─────────────────────────────────────────────
   TYPOGRAPHY — BOOK CONTENT
───────────────────────────────────────────── */

/* Chapter header */
.chapter-header {
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 3px solid var(--primary);
}

.chapter-part-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chapter-number {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.chapter-title {
  font-family: var(--font-ui);
  font-size: 30px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.2;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.chapter-subtitle {
  font-size: 16px;
  color: var(--text-light);
  font-style: italic;
  line-height: 1.5;
}

.chapter-meta {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.chapter-meta-item {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--bg);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* Section headings */
.section-title {
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
  margin: 40px 0 14px;
  padding-top: 8px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  scroll-margin-top: calc(var(--header-h) + 20px);
}

.section-title .s-num {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
}

.subsection-title {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin: 28px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  scroll-margin-top: calc(var(--header-h) + 20px);
}

.subsection-title::before {
  content: '';
  width: 4px;
  height: 18px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
}

.sub-subsection-title {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 8px;
}

/* Body text */
p {
  font-size: 15px;
  line-height: var(--line-height);
  color: var(--text);
  margin-bottom: 14px;
}

/* Lists */
ul, ol {
  padding-left: 24px;
  margin-bottom: 14px;
}

li {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 4px;
}

li::marker { color: var(--primary); font-weight: bold; }

ul.clean { list-style: none; padding-left: 0; }
ul.clean li {
  padding-left: 18px;
  position: relative;
}
ul.clean li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}

/* Strong, em */
strong { font-weight: 700; color: var(--text); }
em { font-style: italic; color: var(--text-light); }
mark {
  background: #fff9c4;
  padding: 0 2px;
  border-radius: 2px;
  font-style: normal;
}

/* ─────────────────────────────────────────────
   CALLOUT BOXES
───────────────────────────────────────────── */
.callout {
  border-radius: 8px;
  padding: 16px 18px;
  margin: 20px 0;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.callout-icon {
  font-size: 20px;
  flex-shrink: 0;
  margin-top: 1px;
  line-height: 1;
}

.callout-body { flex: 1; }

.callout-title {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.callout-body p { margin-bottom: 6px; font-size: 14px; }
.callout-body p:last-child { margin-bottom: 0; }
.callout-body ul { margin-bottom: 0; }
.callout-body li { font-size: 14px; margin-bottom: 3px; }

.callout.note {
  background: var(--callout-note);
  border-left: 4px solid var(--callout-note-border);
}
.callout.note .callout-title { color: #1565c0; }

.callout.tip {
  background: var(--callout-tip);
  border-left: 4px solid var(--callout-tip-border);
}
.callout.tip .callout-title { color: #2e7d32; }

.callout.warn {
  background: var(--callout-warn);
  border-left: 4px solid var(--callout-warn-border);
}
.callout.warn .callout-title { color: #e65100; }

.callout.exam {
  background: var(--callout-exam);
  border-left: 4px solid var(--callout-exam-border);
}
.callout.exam .callout-title { color: #b71c1c; }

.callout.definition {
  background: #f3e5f5;
  border-left: 4px solid #7b1fa2;
}
.callout.definition .callout-title { color: #6a1b9a; }

/* ─────────────────────────────────────────────
   DEFINITION TERM
───────────────────────────────────────────── */
.definition-term {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 14px 0 6px;
  font-family: var(--font-ui);
}

.def-word {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
}

.def-tag {
  font-size: 10px;
  background: rgba(26,35,126,0.08);
  color: var(--primary);
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─────────────────────────────────────────────
   TABLES
───────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  margin: 18px 0;
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
  font-size: 13px;
  background: var(--bg-card);
}

th {
  background: var(--primary);
  color: #fff;
  padding: 10px 14px;
  text-align: left;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.3px;
}

th:first-child { border-radius: 8px 0 0 0; }
th:last-child { border-radius: 0 8px 0 0; }

td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.55;
}

tr:nth-child(even) td { background: rgba(0,0,0,0.018); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(26,35,126,0.03); }

td strong { color: var(--primary); }

/* ─────────────────────────────────────────────
   FORMULA BOX
───────────────────────────────────────────── */
.formula-block {
  background: var(--formula-bg);
  border-radius: 8px;
  padding: 18px 22px;
  margin: 14px 0;
  position: relative;
}

.formula-label {
  font-family: var(--font-ui);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}

.formula-expr {
  font-family: var(--font-code);
  font-size: 18px;
  font-weight: 700;
  color: #64ffda;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.formula-vars {
  font-family: var(--font-ui);
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
}

.formula-vars span {
  color: #80cbc4;
  font-weight: 600;
}

.formula-example {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-family: var(--font-ui);
  font-size: 12px;
  color: rgba(255,255,255,0.55);
}

.formula-example strong { color: #ffe082; font-family: var(--font-code); }

/* ─────────────────────────────────────────────
   COMPARISON COLUMNS (two-col layout)
───────────────────────────────────────────── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 16px 0;
}

.compare-col {
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.compare-col-header {
  padding: 10px 14px;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}

.compare-col-body {
  padding: 12px 14px;
}

.compare-col-body li {
  font-family: var(--font-ui);
  font-size: 13px;
  margin-bottom: 6px;
}

.compare-col:nth-child(1) .compare-col-header { background: var(--primary); }
.compare-col:nth-child(2) .compare-col-header { background: #00695c; }
.compare-col:nth-child(3) .compare-col-header { background: #1565c0; }
.compare-col:nth-child(4) .compare-col-header { background: #6a1b9a; }

/* Three column */
.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 16px 0;
}

.grid-3 .compare-col:nth-child(1) .compare-col-header { background: var(--primary); }
.grid-3 .compare-col:nth-child(2) .compare-col-header { background: #e65100; }
.grid-3 .compare-col:nth-child(3) .compare-col-header { background: #1b5e20; }

/* ─────────────────────────────────────────────
   NUMBERED PRINCIPLE CARDS
───────────────────────────────────────────── */
.principle-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 14px 0;
}

.principle-item {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: box-shadow 0.2s, transform 0.2s;
}

.principle-item:hover {
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  transform: translateX(3px);
}

.principle-num {
  width: 32px;
  height: 32px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}

.principle-content h4 {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}

.principle-content p {
  font-size: 13px;
  margin-bottom: 0;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─────────────────────────────────────────────
   PROCESS STEP CARD
───────────────────────────────────────────── */
.step-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin: 16px 0;
  border-left: 2px solid var(--border);
  padding-left: 0;
}

.step-item {
  display: flex;
  gap: 16px;
  padding: 12px 0 12px 20px;
  position: relative;
}

.step-item::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 18px;
  width: 8px;
  height: 8px;
  background: var(--primary);
  border-radius: 50%;
  border: 2px solid var(--bg);
}

.step-content h4 {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}

.step-content p {
  font-size: 13px;
  margin-bottom: 0;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─────────────────────────────────────────────
   INLINE TAG / BADGE
───────────────────────────────────────────── */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  vertical-align: middle;
}

/* ─────────────────────────────────────────────

.page-nav {

  align-items: center;
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  gap: 12px;
}

.page-nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text);
  transition: all 0.2s;
  text-decoration: none;
  max-width: 48%;
}

.page-nav-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(26,35,126,0.04);
}

.page-nav-btn.next { margin-left: auto; text-align: right; }

.page-nav-btn .nav-dir {
  font-size: 11px;
  color: var(--text-muted);
  display: block;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 2px;
}

.page-nav-btn .nav-title {
  font-weight: 600;
  font-size: 13px;
  line-height: 1.3;
}

/* ─────────────────────────────────────────────
   HIGHLIGHT / FOCUS BOXES
───────────────────────────────────────────── */
.key-point {
  background: var(--highlight-yellow);
  border: 1px solid #f9a825;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 14px;
  line-height: 1.7;
}

.key-point::before {
  content: '⭐ KEY POINT  ';
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 800;
  color: #f57f17;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   CHAPTER INDEX / HOME
───────────────────────────────────────────── */
.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #283593 60%, #1565c0 100%);
  color: #fff;
  border-radius: 12px;
  padding: 40px 44px;
  margin-bottom: 36px;
}

.home-hero h1 {
  font-family: var(--font-ui);
  font-size: 32px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.home-hero p {
  font-size: 16px;
  opacity: 0.8;
  margin-bottom: 0;
  color: #fff;
  line-height: 1.6;
}

.home-hero .hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  padding: 5px 12px;
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 16px;
}

.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}

.home-chapter-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  text-decoration: none;
  color: var(--text);
}

.home-chapter-card:hover {
  border-color: var(--primary);
  box-shadow: 0 4px 16px rgba(26,35,126,0.1);
  transform: translateY(-2px);
}

.home-chapter-icon {
  font-size: 26px;
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: rgba(26,35,126,0.06);
}

.home-chapter-meta h3 {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 3px;
  line-height: 1.3;
}

.home-chapter-meta p {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 0;
  line-height: 1.5;
}

/* ─────────────────────────────────────────────
   EXAM DOMAIN BAR
───────────────────────────────────────────── */
.domain-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
  font-family: var(--font-ui);
  font-size: 13px;
}

.domain-bar-track {
  flex: 1;
  height: 20px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.domain-bar-fill {
  height: 100%;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  border-radius: 4px;
}

/* ─────────────────────────────────────────────
   READING PROGRESS BAR
───────────────────────────────────────────── */
#reading-progress {
  position: fixed;
  top: var(--header-h);
  left: 0;
  right: var(--toc-width);
  height: 3px;
  background: rgba(0,0,0,0.06);
  z-index: 150;
  transition: right 0.3s ease;
}

#reading-progress.toc-hidden { right: 0; }

#reading-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--primary));
  width: 0%;
  transition: width 0.15s ease;
}

/* ─────────────────────────────────────────────
   BACK TO TOP
───────────────────────────────────────────── */
#back-to-top {
  position: fixed;
  bottom: 28px;
  left: 28px;
  width: 40px;
  height: 40px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  z-index: 150;
}
#back-to-top.visible { opacity: 1; transform: translateY(0); }
#back-to-top:hover { background: var(--primary-light); }

/* ─────────────────────────────────────────────
   PRINT
───────────────────────────────────────────── */
@media print {
  #topbar, #toc-panel, #reading-progress, #back-to-top { display: none !important; }
  #content-area { margin-right: 0 !important; }
  #book-page { padding: 20px; max-width: 100%; }
  .callout, .formula-block { page-break-inside: avoid; }
}

/* ─────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────── */
@media (max-width: 1000px) {
  :root { --toc-width: 280px; }
  #book-page { padding: 32px 28px 80px; }
}

@media (max-width: 768px) {

  /* ── TOPBAR MOBILE ── */
  #topbar {
    padding: 0 10px;
    gap: 6px;
  }

  .topbar-logo {
    font-size: 13px;
    gap: 6px;
  }

  /* Hide the 2026 badge on mobile to save space */
  .topbar-logo span {
    display: none;
  }

  .topbar-sep {
    display: none;
  }

  .topbar-breadcrumb {
    font-size: 11px;
    max-width: 100px;
  }

  /* Make Print button smaller on mobile */
  .topbar-btn {
    padding: 5px 8px;
    font-size: 11px;
  }

  /* TOC toggle button — bigger and more visible on mobile */
  #toc-toggle-btn {
    width: 40px !important;
    height: 40px !important;
    font-size: 20px !important;
    background: rgba(255,255,255,0.25) !important;
    border: 2px solid rgba(255,255,255,0.5) !important;
    border-radius: 8px !important;
    flex-shrink: 0;
  }

  /* ── TOC DRAWER ── */
  #toc-panel {
    display: block !important;
    width: 88vw !important;
    max-width: 340px !important;
    position: fixed !important;
    top: var(--header-h) !important;
    right: 0 !important;
    bottom: 0 !important;
    transform: translateX(110%) !important;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1) !important;
    z-index: 500 !important;
    box-shadow: -6px 0 32px rgba(0,0,0,0.25) !important;
    overflow-y: auto !important;
  }

  #toc-panel.mobile-open {
    transform: translateX(0) !important;
  }

  /* ── OVERLAY ── */
  #toc-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 499;
  }

  #toc-overlay.visible {
    display: block;
  }

  /* ── CONTENT ── */
  #content-area {
    margin-right: 0 !important;
  }

  #reading-progress {
    right: 0 !important;
  }

  /* ── LAYOUT FIXES ── */
  .compare-grid { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .home-grid { grid-template-columns: 1fr; }
  #book-page { padding: 16px 12px 60px; }
  .chapter-title { font-size: 22px; }
  .header-search { display: none; }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Formula blocks smaller on mobile */
  .formula-expr {
    font-size: 14px;
  }
}

// ─────────────────────────────────────────────
// TOC HIDDEN STATE
// ─────────────────────────────────────────────
let tocVisible = true;

function toggleTOC() {
  const isMobile = window.innerWidth <= 768;

  if (isMobile) {
    // Mobile: slide-in drawer behavior
    const toc = document.getElementById('toc-panel');
    const overlay = document.getElementById('toc-overlay');
    const isOpen = toc.classList.contains('mobile-open');

    if (isOpen) {
      toc.classList.remove('mobile-open');
      overlay.classList.remove('visible');
    } else {
      toc.classList.add('mobile-open');
      toc.classList.remove('hidden');
      overlay.classList.add('visible');
    }
  } else {
    // Desktop: original hide/show behavior
    tocVisible = !tocVisible;
    document.getElementById('toc-panel').classList.toggle('hidden', !tocVisible);
    document.getElementById('content-area').classList.toggle('toc-hidden', !tocVisible);
    document.getElementById('reading-progress').classList.toggle('toc-hidden', !tocVisible);
  }
}

function closeMobileTOC() {
  document.getElementById('toc-panel').classList.remove('mobile-open');
  document.getElementById('toc-overlay').classList.remove('visible');
}

// ─────────────────────────────────────────────
// BUILD TOC TREE
// ─────────────────────────────────────────────
function buildTOC() {
  const tree = document.getElementById('toc-tree');
  tree.innerHTML = '';
  let currentPart = null;

  bookStructure.forEach((ch, idx) => {
    if (ch.id === 'home') {
      const homeBtn = document.createElement('button');
      homeBtn.className = 'toc-chapter-btn';
      homeBtn.dataset.chId = 'home';
      homeBtn.innerHTML = `<span class="ch-num">🏠</span>${ch.title}`;
      homeBtn.onclick = () => {
        loadChapter('home');
        if (window.innerWidth <= 768) closeMobileTOC();
      };
      tree.appendChild(homeBtn);
      return;
    }

    // Part label
    if (ch.part && ch.part !== currentPart) {
      currentPart = ch.part;
      const partLabel = document.createElement('div');
      partLabel.className = 'toc-part-label';
      partLabel.textContent = ch.part;
      tree.appendChild(partLabel);
    }

    // Chapter button + sections wrapper
    const chDiv = document.createElement('div');
    chDiv.className = 'toc-chapter';

    const chBtn = document.createElement('button');
    chBtn.className = 'toc-chapter-btn';
    chBtn.dataset.chId = ch.id;
    chBtn.innerHTML = `
      <span class="ch-num">${ch.icon}</span>
      <span style="flex:1;line-height:1.4">${ch.chapter ? ch.chapter + ': ' : ''}${ch.title}</span>
      ${ch.sections.length > 0 ? '<span class="ch-arrow">▶</span>' : ''}
    `;
    chBtn.onclick = (e) => {
      loadChapter(ch.id);
      if (window.innerWidth <= 768) closeMobileTOC();
      if (ch.sections.length > 0) {
        chBtn.classList.toggle('open');
        sectionsDiv.classList.toggle('open');
      }
    };

    chDiv.appendChild(chBtn);

    // Sections
    if (ch.sections.length > 0) {
      const sectionsDiv = document.createElement('div');
      sectionsDiv.className = 'toc-sections';
      sectionsDiv.dataset.chId = ch.id;

      ch.sections.forEach(sec => {
        const secBtn = document.createElement('button');
        secBtn.className = 'toc-section-btn';
        secBtn.dataset.secId = sec.id;
        secBtn.textContent = sec.title;
        secBtn.onclick = (e) => {
          e.stopPropagation();
          loadChapter(ch.id, sec.id);
          if (window.innerWidth <= 768) closeMobileTOC();
        };
        sectionsDiv.appendChild(secBtn);
      });

      chDiv.appendChild(sectionsDiv);
    }

    tree.appendChild(chDiv);
  });
}

// ─────────────────────────────────────────────
// CURRENT CHAPTER STATE
// ─────────────────────────────────────────────
let currentChapterId = 'home';

function loadChapter(chapterId, scrollToId = null) {
  currentChapterId = chapterId;

  // Update TOC active state
  document.querySelectorAll('.toc-chapter-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.chId === chapterId) {
      b.classList.add('active');
      // Open section drawer
      b.classList.add('open');
      const secDiv = document.querySelector(`.toc-sections[data-ch-id="${chapterId}"]`);
      if (secDiv) secDiv.classList.add('open');
    }
  });

  // Update breadcrumb
  const ch = bookStructure.find(c => c.id === chapterId);
  if (ch) {
    document.getElementById('breadcrumb').textContent =
      (ch.chapter ? ch.chapter + ' — ' : '') + ch.title;
  }

  // Render content
  const page = document.getElementById('book-page');
  page.innerHTML = getChapterHTML(chapterId);

  // Scroll
  if (scrollToId) {
    setTimeout(() => {
      const el = document.getElementById(scrollToId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  } else {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Setup bottom nav
  renderPageNav(chapterId);
}

function renderPageNav(chapterId) {
  const ids = bookStructure.map(c => c.id);
  const idx = ids.indexOf(chapterId);
  const prev = idx > 0 ? bookStructure[idx - 1] : null;
  const next = idx < bookStructure.length - 1 ? bookStructure[idx + 1] : null;

  const navDiv = document.createElement('div');
  navDiv.className = 'page-nav';

  if (prev) {
    navDiv.innerHTML += `
      <button class="page-nav-btn" onclick="loadChapter('${prev.id}')">
        <span>←</span>
        <span>
          <span class="nav-dir">Previous</span>
          <span class="nav-title">${prev.icon} ${prev.title}</span>
        </span>
      </button>
    `;
  } else {
    navDiv.innerHTML += `<div></div>`;
  }

  if (next) {
    navDiv.innerHTML += `
      <button class="page-nav-btn next" onclick="loadChapter('${next.id}')">
        <span>
          <span class="nav-dir">Next</span>
          <span class="nav-title">${next.icon} ${next.title}</span>
        </span>
        <span>→</span>
      </button>
    `;
  }

  document.getElementById('book-page').appendChild(navDiv);
}

// FILTER TOC
// ─────────────────────────────────────────────
function filterTOC(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.toc-chapter-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.toc-section-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.toc-part-label').forEach(lbl => {
    lbl.style.display = q ? 'none' : '';
  });
}

// ─────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('reading-progress-fill').style.width = progress + '%';

  const btn = document.getElementById('back-to-top');
  btn.classList.toggle('visible', scrollTop > 400);

  // Update active section in TOC (intersection-based)
  updateActiveTOCSection();
});

function updateActiveTOCSection() {
  const sections = document.querySelectorAll('.section-title[id], .subsection-title[id]');
  let current = null;
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top <= 100) current = sec.id;
  });
  if (current) {
    document.querySelectorAll('.toc-section-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.secId === current);
    });
  }
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

<h2 class="section-title" id="s-what-is-pmbok"><span class="s-num">1.1</span> What Is the PMBOK® Guide?</h2>

<p>The <strong>PMBOK® Guide</strong> (Project Management Body of Knowledge) is a publication by the <strong>Project Management Institute (PMI)</strong> that serves as the foundational reference for project management professionals worldwide. It provides a common language, framework, and set of guidelines for managing projects effectively.</p>

<p>The guide is not a prescriptive methodology that must be followed step-by-step. Rather, it describes <strong>generally accepted practices</strong> — those practices that are applicable to most projects, most of the time, and that there is widespread consensus about their value and usefulness.</p>

<div class="callout note">
  <div class="callout-icon">ℹ️</div>
  <div class="callout-body">
    <div class="callout-title">Important Distinction</div>
    <p>"Generally recognized" means the knowledge and practices described are applicable to most projects most of the time — not that all practices should always be used on every project. This is the foundation of tailoring.</p>
  </div>
</div>

<h2 class="section-title" id="s-evolution"><span class="s-num">1.2</span> Evolution from Previous Editions</h2>

<p>The PMBOK® Guide has gone through eight editions. The most dramatic shift occurred with the 7th edition (2021) and continued into the 8th edition, representing a <strong>paradigm shift</strong> in how project management is conceptualized.</p>

<div class="table-wrap">
<table>
  <tr>
    <th>Feature</th>
    <th>Editions 1–6 (Process-Based)</th>
    <th>Editions 7–8 (Principle-Based)</th>
  </tr>
  <tr>
    <td><strong>Core Focus</strong></td>
    <td>49 Processes organized in 5 Process Groups and 10 Knowledge Areas</td>
    <td>12 Principles + 8 Performance Domains</td>
  </tr>
  <tr>
    <td><strong>Approach</strong></td>
    <td>Prescriptive — what processes to follow</td>
    <td>Principle-based — guiding behaviors and outcomes</td>
  </tr>
  <tr>
    <td><strong>Methodology</strong></td>
    <td>Primarily predictive (waterfall)</td>
    <td>All approaches: predictive, adaptive, hybrid</td>
  </tr>
  <tr>
    <td><strong>Success Metric</strong></td>
    <td>On time, on budget, in scope</td>
    <td>Value delivery and beneficial outcomes</td>
  </tr>
  <tr>
    <td><strong>Flexibility</strong></td>
    <td>Limited — process groups were sequential</td>

<h2 class="section-title" id="s-pmbok8-structure"><span class="s-num">1.3</span> Structure of PMBOK® 8</h2>

<p>PMBOK® Guide 8th Edition is organized around three foundational elements:</p>

<div class="principle-list">
  <div class="principle-item">

<p>One of the most confusing aspects of the PMBOK® 8 transition is understanding what replaced the old 5 Process Groups. Here is a clear breakdown:</p>

<div class="compare-grid">

      </ul>

<h2 class="section-title" id="s-value-delivery"><span class="s-num">1.5</span> Value Delivery System</h2>

<p>PMBOK® 8 positions projects within a broader <strong>Value Delivery System</strong> — the idea that projects exist to deliver value to the organization and its stakeholders, not simply to produce outputs.</p>

<p><strong>Value</strong> can be defined as:</p>
<ul>
  <li><strong>Business value:</strong> Financial metrics like ROI, NPV, IRR, payback period</li>
  <li><strong>Social value:</strong> Community impact, sustainability, environmental benefit</li>
  <li><strong>Customer value:</strong> Satisfaction, loyalty, quality of experience</li>
  <li><strong>Organizational value:</strong> Strategic alignment, capability improvement, knowledge gain</li>
</ul>

<p>Projects are initiated to address a <strong>need</strong>, solve a <strong>problem</strong>, or pursue an <strong>opportunity</strong>. The entire project exists to deliver the defined value. This shifts the PM's focus from simply meeting the triple constraint to ensuring the project actually benefits its intended recipients.</p>

<div class="callout tip">
  <div class="callout-icon">✅</div>
  <div class="callout-body">
    <div class="callout-title">Exam Tip</div>
    <p>When the exam asks about project success or what the PM should prioritize, the PMBOK® 8 answer is always <strong>value delivery</strong> — not just scope/schedule/cost compliance. A project can be "on time and on budget" but still fail if it doesn't deliver value.</p>
  </div>

<p>PMBOK® 8 establishes <strong>12 guiding principles</strong> that describe the mindset, behaviors, and values of effective project practitioners. These principles are <em>not</em> rules or processes — they are orientations that should guide decisions and actions across all projects, regardless of methodology or approach.</p>

<h2 class="section-title" id="s-principle-stewardship"><span class="s-num">2.1</span> Principle 1: Stewardship</h2>
<p><strong>"Be a diligent, respectful, and caring steward."</strong></p>
<p>Stewardship means acting responsibly on behalf of the organization, project team, and broader society. It involves ethical behavior, financial integrity, and accountability for decisions. Project managers are stewards of organizational resources and must use them wisely.</p>
<ul>
  <li>Act with integrity and ethical standards at all times</li>
  <li>Demonstrate care for organizational resources (people, budget, equipment)</li>
  <li>Maintain accountability for outcomes</li>
  <li>Consider impacts beyond the immediate project (sustainability, environment, community)</li>
  <li>Follow PMI's Code of Ethics and Professional Conduct</li>
</ul>

<h2 class="section-title" id="s-principle-team"><span class="s-num">2.2</span> Principle 2: Team</h2>
<p><strong>"Create a collaborative project team environment."</strong></p>
<p>Project outcomes depend heavily on the team. This principle emphasizes building a high-performing, collaborative environment where team members feel psychologically safe, valued, and empowered to contribute.</p>
<ul>
  <li>Build a culture of trust, respect, and psychological safety</li>
  <li>Acknowledge individual strengths and contributions</li>
  <li>Support team growth through coaching and mentoring</li>
  <li>Foster collaboration over competition</li>
  <li>Address conflict constructively and proactively</li>
</ul>
<div class="callout tip">
  <div class="callout-icon">💡</div>
  <div class="callout-body">
    <div class="callout-title">Connection to CAPM</div>
    <p>This principle connects to the Team Performance Domain (Chapter 4) and resource management topics. Expect questions about how a PM should respond when team conflict arises — the correct answer is usually to address it directly and collaboratively.</p>
  </div>
</div>

<h2 class="section-title" id="s-principle-stakeholders"><span class="s-num">2.3</span> Principle 3: Stakeholders</h2>
<p><strong>"Effectively engage with stakeholders."</strong></p>
<p>Stakeholder engagement is one of the most critical factors in project success. This principle calls for proactive, continuous engagement — understanding stakeholder needs, interests, and concerns throughout the project.</p>
<ul>
  <li>Identify all stakeholders early and continuously throughout the project</li>
  <li>Understand each stakeholder's needs, interests, and level of influence</li>
  <li>Engage stakeholders appropriately — neither over-communicating nor under-communicating</li>
  <li>Manage stakeholder expectations proactively</li>
  <li>Treat stakeholders as partners, not just receivers of project outputs</li>
</ul>

<h2 class="section-title" id="s-principle-value"><span class="s-num">2.4</span> Principle 4: Value</h2>
<p><strong>"Focus on value."</strong></p>
<p>Every project activity should be evaluated in terms of the value it contributes. Project success is not measured solely by completing deliverables on time and on budget, but by whether those deliverables actually provide the intended benefit.</p>
<ul>
  <li>Continually evaluate whether the project is on track to deliver value</li>
  <li>Be willing to adapt scope, approach, or even cancel the project if value can no longer be achieved</li>
  <li>Distinguish between outputs (deliverables), outcomes (changes in state), and benefits (value created)</li>
  <li>Align project work with the organization's strategic objectives</li>
</ul>

<div class="key-point">The value chain is: Project Activities → Outputs (deliverables) → Outcomes (changes in behavior/state) → Benefits (value to the organization/stakeholders).</div>

<h2 class="section-title" id="s-principle-systems"><span class="s-num">2.5</span> Principle 5: Systems Thinking</h2>
<p><strong>"Recognize, evaluate, and respond to system interactions."</strong></p>
<p>Projects operate within complex organizational systems. A change in one part of the system affects other parts. Project managers must see the "big picture" — understanding how the project interacts with its environment, stakeholders, and organizational processes.</p>
<ul>
  <li>View the project as a system with interconnected elements</li>
  <li>Recognize that decisions in one area (e.g., scope) impact other areas (schedule, cost, risk)</li>
  <li>Understand the project within the context of the broader organization and external environment</li>
  <li>Account for emergent properties — outcomes that arise from system interaction that cannot be predicted by examining components alone</li>
</ul>

<h2 class="section-title" id="s-principle-leadership"><span class="s-num">2.6</span> Principle 6: Leadership</h2>
<p><strong>"Demonstrate leadership behaviors."</strong></p>
<p>Effective project management requires leadership, not just management. Leadership involves inspiring, motivating, and guiding people toward a shared vision — not just tracking tasks and controlling processes.</p>
<ul>
  <li>Lead through influence, not just authority</li>
  <li>Adapt leadership style to the situation and team needs</li>
  <li>Empower team members and build their capabilities</li>
  <li>Communicate vision and purpose clearly</li>
  <li>Recognize and celebrate team achievements</li>
  <li>Navigate ambiguity and change with confidence</li>
</ul>

<div class="table-wrap">
<table>
  <tr><th>Management</th><th>Leadership</th></tr>
  <tr><td>Focuses on tasks, processes, systems</td><td>Focuses on people, vision, culture</td></tr>
  <tr><td>Maintains status quo</td><td>Drives change and innovation</td></tr>
  <tr><td>Relies on authority</td><td>Relies on influence</td></tr>
  <tr><td>Asks "How?"</td><td>Asks "Why?" and "What if?"</td></tr>
</table>
</div>

<h2 class="section-title" id="s-principle-tailoring"><span class="s-num">2.7</span> Principle 7: Tailoring</h2>
<p><strong>"Tailor the delivery approach based on context."</strong></p>
<p>No single approach works for every project. Tailoring means thoughtfully selecting and adapting methodologies, processes, artifacts, and governance to fit the unique context of each project.</p>
<ul>
  <li>Start with the organization's standard approach, then adapt as needed</li>
  <li>Consider project size, complexity, novelty, risk, and stakeholder needs</li>
  <li>Balance rigor with agility — avoid both over-engineering and under-planning</li>
  <li>Document tailoring decisions and rationale</li>
  <li>Continuously refine the approach as the project progresses</li>
</ul>

<h2 class="section-title" id="s-principle-quality"><span class="s-num">2.8</span> Principle 8: Quality</h2>
<p><strong>"Build quality into processes and deliverables."</strong></p>
<p>Quality must be planned and built into the project from the start — it cannot be "inspected in" after the fact. This principle emphasizes prevention over correction and a commitment to meeting stakeholder needs.</p>
<ul>
  <li>Define quality standards early based on stakeholder requirements</li>
  <li>Use quality management tools to prevent defects, not just detect them</li>
  <li>Perform continuous quality reviews throughout the project</li>
  <li>Apply both Quality Assurance (process-focused) and Quality Control (product-focused)</li>
</ul>

<h2 class="section-title" id="s-principle-complexity"><span class="s-num">2.9</span> Principle 9: Complexity</h2>
<p><strong>"Navigate complexity."</strong></p>
<p>Modern projects are complex adaptive systems. Complexity arises from human behavior, organizational dynamics, technological uncertainty, and ambiguity. PMs must recognize and navigate complexity rather than trying to eliminate it.</p>
<ul>
  <li>Recognize sources of complexity: human behavior, technical uncertainty, ambiguity, interdependencies</li>
  <li>Use appropriate tools and approaches for complex environments (adaptive, iterative)</li>
  <li>Foster continuous learning and adaptation</li>
  <li>Avoid oversimplification of complex situations</li>
</ul>

<h2 class="section-title" id="s-principle-risk"><span class="s-num">2.10</span> Principle 10: Risk</h2>
<p><strong>"Optimize risk responses."</strong></p>
<p>All projects involve uncertainty. This principle calls for a proactive, balanced approach to managing both threats and opportunities. Risk management should be proportionate to the level of uncertainty involved.</p>
<ul>
  <li>Identify risks continuously — not just at the start of the project</li>
  <li>Treat risks as both threats (negative) AND opportunities (positive)</li>
  <li>Choose responses proportionate to the risk's probability and impact</li>
  <li>Build risk management into regular project activities, not as a separate process</li>
</ul>

<h2 class="section-title" id="s-principle-adaptability"><span class="s-num">2.11</span> Principle 11: Adaptability & Resiliency</h2>
<p><strong>"Embrace adaptability and resiliency."</strong></p>
<p>The ability to adapt to changing circumstances and bounce back from setbacks is essential. This principle calls for building both individual and organizational capacity to respond to change.</p>
<ul>
  <li>Build flexibility into project plans to accommodate change</li>
  <li>Develop team resilience through support, empowerment, and psychological safety</li>
  <li>Treat change as a natural part of the project, not a failure of planning</li>
  <li>Learn from failures and successes with equal rigor</li>
</ul>

<h2 class="section-title" id="s-principle-change"><span class="s-num">2.12</span> Principle 12: Change</h2>
<p><strong>"Enable change to achieve the envisioned future state."</strong></p>
<p>Projects exist to create change — a transition from the current state to a desired future state. Project managers must not only manage the technical work but also facilitate the organizational and human change that project outcomes require.</p>
<ul>
  <li>Understand the change management aspects of the project</li>
  <li>Prepare stakeholders and the organization for new ways of working</li>
  <li>Address resistance to change proactively</li>
  <li>Ensure that changes are sustained after the project closes</li>
</ul>

<h2 class="section-title" id="s-lifecycle-intro"><span class="s-num">3.1</span> What Is a Project Life Cycle?</h2>

<p>A <strong>project life cycle</strong> is the series of phases that a project passes through from its initiation to its closure. It defines the start and the end of the project and provides a framework for managing the project.</p>

<p>The life cycle answers the question: <em>"What phases does the project go through?"</em></p>

<p>The <strong>development approach</strong> answers: <em>"How will we create the deliverables within each phase?"</em></p>

  <div class="callout-body">
    <div class="callout-title">Key Distinction</div>
    <p>Life cycle and development approach are related but different concepts. A project can have a predictive life cycle (defined phases with gates) while using an agile development approach within each phase. This is a hybrid model.</p>
  </div>
</div>

<h2 class="section-title" id="s-focus-areas"><span class="s-num">3.2</span> Five Focus Areas (PMBOK® 8)</h2>

<p>PMBOK® 8 introduces <strong>Focus Areas</strong> as a replacement for the old Process Groups. They represent areas of concentrated activity rather than sequential, rigid process steps.</p>

<div class="principle-list">
  <div class="principle-item">

    </div>

    <div class="principle-num">3</div>

  </div>

      <p>Finalize all activities, complete contracts, release resources, archive documents, document lessons learned, and obtain formal acceptance of deliverables.</p>
    </div>
  </div>
</div>

<h2 class="section-title" id="s-dev-approaches"><span class="s-num">3.3</span> Development Approaches — Overview</h2>

<p>PMBOK® 8 recognizes five development approaches. The key is selecting (and tailoring) the approach that best fits the project's context, requirements stability, stakeholder engagement needs, and organizational constraints.</p>

<div class="table-wrap">
<table>
  <tr>
    <th>Approach</th>
    <th>Requirements</th>
    <th>Delivery</th>
    <th>Best For</th>
  </tr>
  <tr>
    <td><strong>Predictive</strong></td>
    <td>Fixed upfront</td>
    <td>Single delivery at end</td>
    <td>Well-understood, stable requirements; construction, manufacturing</td>
  </tr>
  <tr>
    <td><strong>Iterative</strong></td>
    <td>Evolves with feedback</td>
    <td>Repeated cycles improving quality</td>
    <td>Complex, unclear solutions; creative work</td>
  </tr>
  <tr>
    <td><strong>Incremental</strong></td>
    <td>Progressive delivery</td>
    <td>Partial deliveries of complete functionality</td>
    <td>Large projects needing early partial value</td>
  </tr>
  <tr>
    <td><strong>Adaptive (Agile)</strong></td>
    <td>Emerge during project</td>
    <td>Frequent small deliveries</td>
    <td>High change, innovative products, software</td>
  </tr>
  <tr>
    <td><strong>Hybrid</strong></td>
    <td>Mixed stability</td>
    <td>Combination of above</td>
    <td>Most real-world complex projects</td>
  </tr>
</table>
</div>

<h2 class="section-title" id="s-predictive-dev"><span class="s-num">3.4</span> Predictive Approach</h2>

<p>The <strong>predictive approach</strong> (also called waterfall, plan-driven, or traditional) is characterized by defining all requirements and planning the entire project upfront before execution begins. Each phase must be completed before the next begins.</p>

<p><strong>Key characteristics:</strong></p>
<ul>
  <li>Scope, schedule, and cost are defined early and held stable</li>
  <li>Changes are managed through a formal change control process</li>
  <li>One final delivery at project close</li>
  <li>Heavy documentation and planning upfront</li>
  <li>Best for projects with well-understood, stable requirements</li>
</ul>

<p><strong>When to use predictive:</strong></p>
<ul>
  <li>Requirements are well understood and unlikely to change</li>
  <li>Technology is mature and proven</li>
  <li>Regulatory or contractual requirements mandate a structured approach</li>
  <li>Team is large and distributed (predictability reduces coordination complexity)</li>
  <li>Examples: construction, infrastructure, manufacturing, compliance projects</li>
</ul>

<h2 class="section-title" id="s-iterative-dev"><span class="s-num">3.5</span> Iterative & Incremental Approaches</h2>

<p><strong>Iterative:</strong> Work is done in repeated cycles (iterations) that progressively refine the product. Each iteration produces a more complete version. Focus is on learning and improving with each cycle.</p>

<p><strong>Incremental:</strong> The product is built and delivered in successive portions (increments). Each increment adds new functionality to the previously delivered portion. Stakeholders receive partial value early.</p>

<p><strong>Both approaches share:</strong></p>
<ul>
  <li>Early and frequent feedback loops with stakeholders</li>
  <li>Ability to accommodate change more easily than predictive</li>
  <li>Reduced risk through early validation</li>
</ul>

<h2 class="section-title" id="s-adaptive-dev"><span class="s-num">3.6</span> Adaptive (Agile) Approach</h2>

<p>The <strong>adaptive approach</strong> (agile) is designed for environments of high uncertainty and frequent change. Requirements emerge and evolve through collaboration. Short iterations deliver working product increments frequently.</p>

<p><strong>When to use adaptive:</strong></p>
<ul>
  <li>Requirements are unclear, unstable, or expected to change significantly</li>
  <li>Customer engagement and feedback are available and encouraged</li>
  <li>Speed to market and early value delivery are priorities</li>
  <li>Innovation or creative problem-solving is needed</li>
  <li>Team is small, co-located (or highly collaborative), and cross-functional</li>
  <li>Examples: software development, digital products, research projects</li>
</ul>

<h2 class="section-title" id="s-hybrid-dev"><span class="s-num">3.7</span> Hybrid Approach</h2>

<p>A <strong>hybrid approach</strong> combines elements from both predictive and adaptive approaches. It is the most commonly used approach in real-world projects today.</p>

<p><strong>Common hybrid combinations:</strong></p>
<ul>
  <li>Predictive planning and governance with agile execution within phases</li>
  <li>Fixed scope/budget (predictive) with iterative development (agile)</li>
  <li>Phase gates (predictive) with sprints within each phase (agile)</li>
  <li>Using Kanban for ongoing operational work while managing project milestones predictively</li>
</ul>

<h2 class="section-title" id="s-selecting-approach"><span class="s-num">3.8</span> Selecting the Right Approach</h2>

<p>Choosing the right development approach requires analyzing several factors. PMBOK® 8 provides guidance through its <strong>Tailoring Decision Framework</strong>.</p>

<div class="table-wrap">
<table>
  <tr>
    <th>Factor</th>
    <th>Lean Toward Predictive</th>
    <th>Lean Toward Adaptive</th>
  </tr>
  <tr>

    <td>Unstable, evolving requirements</td>
  </tr>
  <tr>
    <td><strong>Change frequency</strong></td>
    <td>Low expected change</td>
    <td>High expected change</td>
  </tr>
  <tr>

  </tr>

    <td><strong>Risk level</strong></td>
    <td>Lower risk, proven approach</td>
    <td>High risk, innovative work</td>
  </tr>
  <tr>
    <td><strong>Team size</strong></td>
    <td>Large, distributed teams</td>
    <td>Small, co-located teams</td>
  </tr>
  <tr>
    <td><strong>Regulatory environment</strong></td>
    <td>Highly regulated (FDA, safety)</td>
    <td>Minimal regulatory constraints</td>
  </tr>
  <tr>
    <td><strong>Delivery needs</strong></td>
    <td>Single final delivery acceptable</td>
    <td>Frequent partial delivery needed</td>
  </tr>
</table>
</div>

<h2 class="section-title" id="s-domains-overview"><span class="s-num">4.0</span> Performance Domains Overview</h2>

<p>PMBOK® 8 organizes project management activities into <strong>8 Performance Domains</strong>. These are groups of related activities that function concurrently throughout the project. Unlike the old process groups, they are not sequential — all domains are active at all times, though with varying intensity at different points in the project.</p>

<div class="callout note">
  <div class="callout-icon">ℹ️</div>
  <div class="callout-body">

<h2 class="section-title" id="s-domain-stakeholder"><span class="s-num">4.1</span> Stakeholder Performance Domain</h2>
<p>Focuses on all activities and functions associated with stakeholders throughout the project. The desired outcome is productive working relationships with all stakeholders, stakeholder satisfaction with project outcomes, and a shared understanding of the project direction.</p>
<p><strong>Key activities:</strong></p>
<ul>
  <li>Identify and analyze all stakeholders (Power/Interest Grid, Salience Model)</li>
  <li>Understand each stakeholder's needs, interests, expectations, and potential impact</li>
  <li>Develop a stakeholder engagement plan</li>
  <li>Continuously engage and communicate with stakeholders</li>
  <li>Monitor stakeholder sentiment and adjust engagement strategy</li>
</ul>

<h2 class="section-title" id="s-domain-team"><span class="s-num">4.2</span> Team Performance Domain</h2>
<p>Encompasses activities and functions associated with building and maintaining an effective project team. The goal is a shared ownership culture, a high-performing team, and leadership behaviors appropriate to the context.</p>
<p><strong>Key activities:</strong></p>
<ul>
  <li>Team development through Tuckman's stages (Forming, Storming, Norming, Performing, Adjourning)</li>
  <li>Applying appropriate leadership styles (servant leadership, situational leadership)</li>

  <li>Managing team performance and addressing conflicts</li>
  <li>Creating a psychologically safe environment</li>
  <li>Supporting team members' professional development</li>
</ul>

<h2 class="section-title" id="s-domain-lifecycle-domain"><span class="s-num">4.3</span> Development Approach & Life Cycle Domain</h2>
<p>Focuses on selecting and adapting the appropriate development approach, life cycle phases, and delivery cadence. The outcome is a development approach that is optimal for the project and enables the team to deliver value.</p>
<p><strong>Key activities:</strong></p>
<ul>
  <li>Selecting between predictive, iterative, incremental, adaptive, or hybrid approaches</li>
  <li>Defining project phases and phase gates</li>
  <li>Determining the delivery cadence (single delivery, periodic delivery, continuous delivery)</li>
  <li>Tailoring the approach based on project characteristics</li>
</ul>

<h2 class="section-title" id="s-domain-planning"><span class="s-num">4.4</span> Planning Performance Domain</h2>
<p>Addresses the activities and functions necessary to produce the component plans that comprise the project management plan. The outcome is an organized, coordinated, and deliverable-focused project plan that evolves as needed.</p>
<p><strong>Key activities:</strong></p>
<ul>
  <li>Developing the project management plan and all subsidiary plans</li>
  <li>Establishing scope, schedule, and cost baselines</li>
  <li>Rolling wave planning and progressive elaboration</li>
  <li>Defining milestones and deliverables</li>
  <li>Planning for risk, quality, communications, and resources</li>
</ul>

<h2 class="section-title" id="s-domain-work"><span class="s-num">4.5</span> Project Work Performance Domain</h2>
<p>Focuses on the processes and activities to establish project processes, manage physical resources, and foster a learning environment. The outcome is efficient project performance, appropriate use of resources, and continuous improvement.</p>
<p><strong>Key activities:</strong></p>
<ul>

  <li>Managing physical resources (equipment, materials, facilities)</li>
  <li>Procurement management (vendor selection, contracts, supplier performance)</li>
  <li>Maintaining project work performance information</li>
  <li>Knowledge management and lessons learned</li>

</ul>

<h2 class="section-title" id="s-domain-delivery"><span class="s-num">4.6</span> Delivery Performance Domain</h2>
<p>Addresses activities associated with delivering value. The desired outcomes are complete scope delivery, quality requirements met, stakeholder benefit realization, and support for the organizational change resulting from the project.</p>
<p><strong>Key activities:</strong></p>
<ul>
  <li>Managing requirements and scope to ensure all deliverables are produced</li>
  <li>Quality management — ensuring deliverables meet standards</li>

  <li>Coordinating sub-deliverables and integrating them into a cohesive whole</li>
</ul>

<h2 class="section-title" id="s-domain-measurement"><span class="s-num">4.7</span> Measurement Performance Domain</h2>

<h2 class="section-title" id="s-domain-uncertainty"><span class="s-num">4.8</span> Uncertainty Performance Domain</h2>

  <li>Managing ambiguity by gathering information and prototyping</li>
</ul>

    <p>These domains operate CONCURRENTLY — not sequentially. All are active throughout the project.</p>

<h2 class="section-title" id="s-constraints"><span class="s-num">6.3</span> Project Constraints</h2>

<p>Project constraints are factors that limit the performance of the project. The classic model is the <strong>Triple Constraint</strong> (also called the Iron Triangle): Scope, Time (Schedule), and Cost (Budget).</p>

<p>PMBOK® 8 recognizes a broader set of constraints including quality, resources, risk, and customer satisfaction. <strong>Changing one constraint affects the others.</strong></p>

<div class="key-point">If you add scope without adjusting time, cost, or quality — you will get scope creep and project failure. This is the fundamental tension every PM must manage.</div>

<p><strong>Types of constraints:</strong></p>
<ul>

  <li><strong>Time:</strong> The schedule — deadlines, milestones, and the project end date</li>
  <li><strong>Cost:</strong> The budget allocated for the project</li>
  <li><strong>Quality:</strong> The standards that deliverables must meet</li>
  <li><strong>Resources:</strong> The people, equipment, and materials available</li>
  <li><strong>Risk:</strong> Uncertainty that could affect objectives</li>
</ul>

  <li>Approve scope changes beyond PM authority</li>
  <li>Provide strategic direction</li>
  <li>Ensure project alignment with business strategy</li>
</ul>

<h2 class="section-title" id="s-team-role"><span class="s-num">7.3</span> Project Team</h2>
<p>The <strong>Project Team</strong> comprises all individuals who perform the work to achieve project objectives. This includes technical specialists, subject matter experts, and support staff.</p>
<p>In agile contexts, teams are typically <strong>self-organizing</strong> (they decide how to do the work) and <strong>cross-functional</strong> (they have all skills needed without depending on outside teams).</p>

<h2 class="section-title" id="s-stakeholder-role"><span class="s-num">7.4</span> Stakeholders</h2>
<p>A <strong>stakeholder</strong> is any individual, group, or organization that may affect, be affected by, or perceive itself to be affected by a decision, activity, or outcome of the project.</p>
<p>Stakeholders include: customers/users, performing organization, project team, functional managers, PMO, suppliers, society/community, regulatory bodies, and competitors.</p>
<div class="callout note">
  <div class="callout-icon">ℹ️</div>
  <div class="callout-body">
    <div class="callout-title">Negative Stakeholders</div>
    <p>Some stakeholders may oppose the project (e.g., a department whose work will be automated). They are still stakeholders and must be managed. Ignoring them increases project risk.</p>
  </div>
</div>

<h2 class="section-title" id="s-pmo-role"><span class="s-num">7.5</span> PMO (Project Management Office)</h2>
<p>See Section 6.5 for PMO types (Supportive, Controlling, Directive). The PMO's role in the team context:</p>
<ul>
  <li>Provides governance standards and templates</li>
  <li>Tracks portfolio performance</li>
  <li>Mentors and trains PMs</li>
  <li>Manages shared resources across projects</li>
  <li>Maintains organizational PM methodology</li>
</ul>

<h2 class="section-title" id="s-org-structures"><span class="s-num">7.6</span> Organizational Structures</h2>
<p>The organizational structure significantly affects the PM's authority and the team's ability to execute work.</p>
<div class="table-wrap">
<table>
  <tr>
    <th>Structure</th>
    <th>PM Authority</th>
    <th>Team Assignment</th>
    <th>Resource Control</th>
  </tr>
  <tr>
    <td><strong>Functional</strong></td>
    <td>Little to none</td>
    <td>Part-time (functional role first)</td>
    <td>Functional Manager</td>
  </tr>
  <tr>
    <td><strong>Weak Matrix</strong></td>
    <td>Limited</td>
    <td>Part-time</td>
    <td>Primarily Functional Manager</td>
  </tr>
  <tr>
    <td><strong>Balanced Matrix</strong></td>
    <td>Low to moderate</td>
    <td>Part-time</td>
    <td>Shared PM/Functional Manager</td>
  </tr>
  <tr>
    <td><strong>Strong Matrix</strong></td>
    <td>Moderate to high</td>
    <td>Full-time</td>
    <td>Primarily PM</td>
  </tr>
  <tr>
    <td><strong>Projectized</strong></td>
    <td>High to total</td>
    <td>Full-time dedicated</td>

  <tr>

<div class="subsection-title">Salience Model</div>

<h2 class="section-title" id="s-engagement-planning"><span class="s-num">8.3</span> Planning Stakeholder Engagement</h2>
<p>The <strong>Stakeholder Engagement Plan</strong> (part of the project management plan) describes:</p>

<h2 class="section-title" id="s-pmp"><span class="s-num">9.1</span> Project Management Plan</h2>
<p>The <strong>Project Management Plan (PMP)</strong> is the overarching document that defines how the project will be executed, monitored, controlled, and closed. It is not a schedule — it is a comprehensive guide to managing the project.</p>
<p>The PMP consists of <strong>subsidiary management plans</strong> (one for each knowledge area) plus the three <strong>baselines</strong>.</p>
<div class="callout note">
  <div class="callout-icon">ℹ️</div>
  <div class="callout-body">
    <div class="callout-title">The PMP is the "plan for planning"</div>
    <p>Each subsidiary plan defines HOW that aspect of the project will be managed. For example, the Risk Management Plan explains how risk management will be conducted — it does not list risks (that's the Risk Register).</p>
  </div>
</div>

<h2 class="section-title" id="s-scope-planning"><span class="s-num">9.2</span> Scope Planning</h2>
<p>Scope planning defines exactly what work IS and IS NOT included in the project.</p>
<p><strong>Key documents:</strong></p>
<ul>
  <li><strong>Scope Management Plan:</strong> How scope will be defined, validated, and controlled</li>
  <li><strong>Requirements Management Plan:</strong> How requirements will be gathered, tracked, and managed</li>
  <li><strong>Project Scope Statement:</strong> Detailed description of project scope, deliverables, exclusions, assumptions, and constraints</li>
  <li><strong>Scope Baseline:</strong> Scope Statement + WBS + WBS Dictionary (the approved version)</li>
</ul>

<h2 class="section-title" id="s-wbs"><span class="s-num">9.3</span> Work Breakdown Structure (WBS)</h2>
<p>The <strong>WBS</strong> is a hierarchical decomposition of the total scope of work into smaller, more manageable components. It organizes everything the project team must do to produce the deliverables.</p>
<p><strong>Key WBS principles:</strong></p>
<ul>
  <li>The WBS decomposes <strong>deliverables</strong>, NOT activities (activities come later in scheduling)</li>
  <li>The <strong>100% Rule:</strong> The WBS captures 100% of the project scope — nothing is left out</li>
  <li>The lowest level is called a <strong>Work Package</strong> — the unit that can be scheduled, costed, and assigned</li>
  <li>Work packages are decomposed into <strong>activities</strong> for schedule development</li>
  <li>The <strong>WBS Dictionary</strong> provides detailed descriptions of each WBS element</li>
</ul>
<div class="callout exam">
  <div class="callout-icon">🎯</div>
  <div class="callout-body">
    <div class="callout-title">Exam Alert: WBS is about Deliverables</div>
    <p>The WBS shows WHAT will be delivered, not HOW. It contains deliverables and work packages — not activities, tasks, or resources. This is a very commonly tested distinction.</p>
  </div>
</div>

<h2 class="section-title" id="s-requirements"><span class="s-num">9.4</span> Requirements Management</h2>
<p>Requirements define what the product/service/result must do or be. They flow from stakeholder needs to deliverables.</p>
<p><strong>Requirements hierarchy:</strong></p>
<ul>
  <li><strong>Business requirements:</strong> High-level business need ("We need to increase online sales by 20%")</li>
  <li><strong>Stakeholder requirements:</strong> What specific stakeholders need ("I need to see sales reports by region")</li>
  <li><strong>Solution requirements:</strong> Functional (what the system does) and Non-functional (how it performs)</li>
  <li><strong>Transition requirements:</strong> Temporary capabilities needed to transition from current to future state</li>
  <li><strong>Quality requirements:</strong> Standards and criteria for acceptable quality</li>
</ul>
<p><strong>Key requirement artifact:</strong> <strong>Requirements Traceability Matrix (RTM)</strong> — links each requirement from its source through validation to ensure nothing is lost.</p>

<h2 class="section-title" id="s-assumptions-constraints"><span class="s-num">9.5</span> Assumptions & Constraints</h2>
<div class="compare-grid">
  <div class="compare-col">
    <div class="compare-col-header">Assumptions</div>
    <div class="compare-col-body">
      <p style="font-size:13px;">Factors believed to be true for planning purposes but not yet proven. <strong>All assumptions carry risk.</strong></p>
      <p style="font-size:13px;"><em>Example: "We assume the vendor will deliver on time." "We assume the client will provide the data by Week 3."</em></p>
      <p style="font-size:13px;">Documented in the <strong>Assumption Log</strong>. Must be validated as the project progresses.</p>
    </div>
  </div>
  <div class="compare-col">
    <div class="compare-col-header" style="background:#1565c0;">Constraints</div>
    <div class="compare-col-body">
      <p style="font-size:13px;">Limiting factors that affect the project. <strong>They are given and must be worked within.</strong></p>
      <p style="font-size:13px;"><em>Example: "The project must be completed by December 31." "The budget cannot exceed $500,000."</em></p>
      <p style="font-size:13px;">Constraints narrow the options available to the PM and team when planning.</p>
    </div>
  </div>
</div>

<h2 class="section-title" id="s-change-control"><span class="s-num">9.6</span> Change Control Process</h2>
<p>All changes to project baselines must go through the <strong>Integrated Change Control</strong> process — no exceptions, regardless of who requests the change.</p>
<div class="step-list">
  <div class="step-item">
    <div class="step-content">
      <h4>1. Change Request Submitted</h4>
      <p>Anyone can submit a change request. It is formally documented in the Change Log.</p>
    </div>
  </div>
  <div class="step-item">
    <div class="step-content">
      <h4>2. Impact Analysis</h4>
      <p>The PM analyzes the impact of the change on scope, schedule, cost, quality, risk, and resources.</p>
    </div>
  </div>
  <div class="step-item">
    <div class="step-content">
      <h4>3. CCB Review</h4>
      <p>The Change Control Board reviews the change request and impact analysis.</p>
    </div>
  </div>
  <div class="step-item">
    <div class="step-content">
      <h4>4. Approve / Reject / Defer</h4>
      <p>CCB makes a decision. Approved changes update the baselines and plans.</p>
    </div>
  </div>
  <div class="step-item">
    <div class="step-content">
      <h4>5. Communicate & Implement</h4>
      <p>All stakeholders are informed of the decision. If approved, the change is implemented and all affected plans are updated.</p>
    </div>
  </div>
</div>

</div>

<div class="chapter-header">
  <div class="chapter-part-label">Part II — PM Fundamentals & Core Concepts</div>
  <div class="chapter-number">Chapter 10</div>
  <div class="chapter-title">Schedule Management</div>

  <div class="chapter-meta">
